<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photobooth - Option 4 (손가락 드로잉 & 스티커)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 900px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }
        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        #video, #canvas, #drawingCanvas, #stickerCanvas {
            position: absolute;
            width: 100%;
            height: 100%;
            display: block;
        }
        #video { display: none; }
        #canvas { z-index: 1; }
        #drawingCanvas { z-index: 2; }
        #stickerCanvas { z-index: 3; }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }
        .info-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-panel h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .info {
            text-align: center;
            margin-top: 10px;
            font-size: 0.95em;
            color: #666;
        }

        .status {
            text-align: center;
            font-size: 1em;
            font-weight: bold;
            margin-top: 15px;
            padding: 12px;
            background: #f0f4ff;
            border-radius: 8px;
            color: #667eea;
        }

        .status.drawing {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status.idle {
            background: #fff3e0;
            color: #e65100;
        }
        .mode-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }
        .mode-tab {
            padding: 10px 20px;
            background: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.95em;
            font-weight: bold;
            transition: all 0.3s;
        }
        .mode-tab.active {
            background: #667eea;
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        .sticker-palette {
            display: none;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .sticker-palette.show {
            display: flex;
        }
        .sticker-btn {
            font-size: 40px;
            padding: 10px 15px;
            border: 3px solid #ddd;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .sticker-btn:hover {
            transform: scale(1.1);
            border-color: #667eea;
        }
        .sticker-btn.selected {
            border-color: #667eea;
            background: #f0f4ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ 손가락 드로잉 & 스티커</h1>
            <p>손가락으로 그리고 스티커를 배치하세요!</p>
        </div>

        <!-- 모드 선택 탭 -->
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="draw">🖌️ 그리기</button>
            <button class="mode-tab" data-mode="sticker">🏷️ 스티커</button>
        </div>

        <!-- 스티커 팔레트 -->
        <div class="sticker-palette" id="stickerPalette">
            <button class="sticker-btn" data-sticker="heart">❤️</button>
            <button class="sticker-btn" data-sticker="star">⭐</button>
            <button class="sticker-btn" data-sticker="hamburger">🍔</button>
            <button class="sticker-btn" data-sticker="cat">😸</button>
        </div>

        <div class="video-wrapper">
            <video id="video"></video>
            <canvas id="canvas"></canvas>
            <canvas id="drawingCanvas"></canvas>
            <canvas id="stickerCanvas"></canvas>
        </div>

        <div class="controls">
            <button class="btn-primary" id="startBtn">카메라 시작</button>
            <button class="btn-secondary" id="stopBtn" disabled>중지</button>
            <button class="btn-secondary" id="clearBtn" disabled>초기화</button>
            <button class="btn-secondary" id="downloadBtn" disabled>다운로드</button>
        </div>

        <div class="info-panel">
            <h2>📊 상태 정보</h2>
            <div class="status idle" id="status">준비 중...</div>
            <div class="info">
                ✋ 그리기 모드: 손가락을 펼치면 그려집니다<br>
                🏷️ 스티커 모드: 두 손가락으로 핀치하여 스티커를 배치하세요
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const drawingCanvas = document.getElementById('drawingCanvas');
        const stickerCanvas = document.getElementById('stickerCanvas');
        const ctx = canvas.getContext('2d');
        const drawCtx = drawingCanvas.getContext('2d');
        const stickerCtx = stickerCanvas.getContext('2d');

        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusEl = document.getElementById('status');
        const stickerPalette = document.getElementById('stickerPalette');

        let handLandmarker = null;
        let isRunning = false;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // 포인트 히스토리 (최근 5프레임 저장)
        let pointHistory = [];
        const HISTORY_SIZE = 5;

        // 모드 & 스티커 상태
        let mode = 'draw'; // 'draw' or 'sticker'
        let selectedSticker = null;
        let stickers = []; // {x, y, type} - 고정된 스티커
        let floatingSticker = null; // {x, y, type} - 따라다니는 임시 스티커
        let isPinching = false; // 현재 핀치 중인지 여부

        // MediaPipe 초기화
        async function initMediaPipe() {
            try {
                const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0');
                const FilesetResolver = vision.FilesetResolver;
                const HandLandmarker = vision.HandLandmarker;

                handLandmarker = await HandLandmarker.createFromOptions(
                    await FilesetResolver.forVisionTasks(
                        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm'
                    ),
                    {
                        baseOptions: {
                            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task'
                        },
                        runningMode: 'VIDEO',
                        numHands: 1
                    }
                );
                console.log('✅ MediaPipe HandLandmarker 로드 완료');
                statusEl.textContent = '준비 완료. 시작 버튼을 누르세요!';
            } catch (error) {
                console.error('❌ MediaPipe 로드 실패:', error);
                statusEl.textContent = '에러: MediaPipe 로드 실패';
            }
        }

        // 카메라 시작
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    drawingCanvas.width = video.videoWidth;
                    drawingCanvas.height = video.videoHeight;
                    isRunning = true;
                    startBtn.disabled = true;
                    stopBtn.disabled = false;
                    clearBtn.disabled = false;
                    statusEl.textContent = '준비 완료. 손가락을 펼치세요!';
                    statusEl.className = 'status idle';
                    processFrame();
                };
            } catch (err) {
                alert('카메라에 접근할 수 없습니다: ' + err.message);
            }
        }

        // 손 상태 감지 (펼침/주먹)
        function isHandOpen(landmarks) {
            // 검지 끝(#8)과 손가락 PIP(#7) 사이의 거리
            const tipIndex = 8;
            const pipIndex = 7;
            
            const distance = Math.sqrt(
                Math.pow(landmarks[tipIndex].x - landmarks[pipIndex].x, 2) +
                Math.pow(landmarks[tipIndex].y - landmarks[pipIndex].y, 2)
            );
            
            // 거리가 0.03 이상이면 펼쳐있음
            return distance > 0.03;
        }

        // 프레임 처리
        function processFrame() {
            if (!isRunning) return;

            // 웹캠 거울 모드 (좌우 반전)
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();

            if (handLandmarker && video.readyState === video.HAVE_ENOUGH_DATA) {
                const results = handLandmarker.detectForVideo(video, performance.now());

                if (results.landmarks.length > 0) {
                    const landmarks = results.landmarks[0];

                    if (mode === 'draw') {
                        // ===== 그리기 모드 =====
                        const open = isHandOpen(landmarks);
                        const fingerTip = landmarks[8];
                        const x = (1 - fingerTip.x) * drawingCanvas.width;
                        const y = fingerTip.y * drawingCanvas.height;

                        if (open) {
                            pointHistory.push({x, y});
                            if (pointHistory.length > HISTORY_SIZE) {
                                pointHistory.shift();
                            }

                            if (isDrawing) {
                                if (pointHistory.length >= 2) {
                                    drawSmoothLine();
                                }
                            } else {
                                isDrawing = true;
                            }
                            lastX = x;
                            lastY = y;
                            statusEl.textContent = '🎨 그리는 중...';
                            statusEl.className = 'status drawing';
                            downloadBtn.disabled = false;
                        } else {
                            if (isDrawing) {
                                isDrawing = false;
                                pointHistory = [];
                                statusEl.textContent = '✋ 준비 중. 손가락을 펼치세요!';
                                statusEl.className = 'status idle';
                            }
                        }

                        // 손가락 끝 시각화
                        ctx.fillStyle = 'rgba(100, 200, 255, 0.6)';
                        ctx.beginPath();
                        ctx.arc(x, y, 15, 0, Math.PI * 2);
                        ctx.fill();

                    } else if (mode === 'sticker') {
                        // ===== 스티커 모드 =====
                        const pinch = detectPinch(landmarks);

                        if (pinch.isPinch && selectedSticker) {
                            // 핀치 중: 임시 스티커를 손가락을 따라다니게 설정
                            floatingSticker = {
                                x: 1 - pinch.x,
                                y: pinch.y,
                                type: selectedSticker
                            };
                            isPinching = true;
                            statusEl.textContent = `🎨 ${selectedSticker}를 배치 중...`;
                        } else {
                            // 핀치 풀림: 임시 스티커를 고정된 스티커로 변환
                            if (isPinching && floatingSticker) {
                                addSticker(floatingSticker.x, floatingSticker.y, floatingSticker.type);
                                statusEl.textContent = `✅ ${floatingSticker.type} 배치 완료!`;
                            }
                            floatingSticker = null;
                            isPinching = false;
                        }

                        // 핀치 위치 시각화
                        if (pinch.isPinch) {
                            const x = (1 - pinch.x) * stickerCanvas.width;
                            const y = pinch.y * stickerCanvas.height;
                            ctx.fillStyle = 'rgba(255, 100, 100, 0.6)';
                            ctx.beginPath();
                            ctx.arc(x, y, 12, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                } else {
                    if (isDrawing) {
                        isDrawing = false;
                        pointHistory = [];
                        statusEl.textContent = '❌ 손이 감지되지 않습니다';
                        statusEl.className = 'status idle';
                    }
                }
            }

            // 따라다니는 임시 스티커 렌더링 (매 프레임)
            if (floatingSticker && mode === 'sticker') {
                stickerCtx.clearRect(0, 0, stickerCanvas.width, stickerCanvas.height);
                drawAllStickers();
                // 임시 스티커는 반투명하게 그리기
                stickerCtx.globalAlpha = 0.7;
                drawSticker(
                    floatingSticker.x * stickerCanvas.width,
                    floatingSticker.y * stickerCanvas.height,
                    floatingSticker.type
                );
                stickerCtx.globalAlpha = 1.0;
            }

            requestAnimationFrame(processFrame);
        }

        // Catmull-Rom Spline 곡선 계산
        function catmullRom(p0, p1, p2, p3, t) {
            const t2 = t * t;
            const t3 = t2 * t;
            return 0.5 * (
                2 * p1 +
                (-p0 + p2) * t +
                (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 +
                (-p0 + 3 * p1 - 3 * p2 + p3) * t3
            );
        }

        // 부드러운 선 그리기 (Catmull-Rom Spline)
        function drawSmoothLine() {
            if (pointHistory.length < 2) return;

            // 현재 히스토리 기반으로 곡선 렌더링
            const points = pointHistory;
            const resolution = 10; // 점 사이마다 10개의 세그먼트

            // 곡선 그릴 점들 준비
            for (let i = 0; i < points.length - 1; i++) {
                // Catmull-Rom에 필요한 4개의 제어점
                const p0 = points[Math.max(0, i - 1)];
                const p1 = points[i];
                const p2 = points[i + 1];
                const p3 = points[Math.min(points.length - 1, i + 2)];

                for (let j = 0; j < resolution; j++) {
                    const t = j / resolution;
                    const nextT = (j + 1) / resolution;

                    const x1 = catmullRom(p0.x, p1.x, p2.x, p3.x, t);
                    const y1 = catmullRom(p0.y, p1.y, p2.y, p3.y, t);
                    const x2 = catmullRom(p0.x, p1.x, p2.x, p3.x, nextT);
                    const y2 = catmullRom(p0.y, p1.y, p2.y, p3.y, nextT);

                    // 그림자
                    drawCtx.strokeStyle = 'rgba(0, 0, 0, 0.3)';
                    drawCtx.lineWidth = 36;
                    drawCtx.lineCap = 'round';
                    drawCtx.lineJoin = 'round';
                    drawCtx.beginPath();
                    drawCtx.moveTo(x1 + 2, y1 + 2);
                    drawCtx.lineTo(x2 + 2, y2 + 2);
                    drawCtx.stroke();

                    // 메인 선
                    drawCtx.strokeStyle = '#87CEEB';
                    drawCtx.lineWidth = 30;
                    drawCtx.lineCap = 'round';
                    drawCtx.lineJoin = 'round';
                    drawCtx.beginPath();
                    drawCtx.moveTo(x1, y1);
                    drawCtx.lineTo(x2, y2);
                    drawCtx.stroke();

                    // 하이라이트
                    drawCtx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
                    drawCtx.lineWidth = 12;
                    drawCtx.beginPath();
                    drawCtx.moveTo(x1 - 2, y1 - 2);
                    drawCtx.lineTo(x2 - 2, y2 - 2);
                    drawCtx.stroke();
                }
            }
        }

        // 모드 전환
        function switchMode(newMode) {
            mode = newMode;
            isDrawing = false;
            pointHistory = [];
            floatingSticker = null;
            isPinching = false;
            selectedSticker = null;

            document.querySelectorAll('.mode-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-mode="${newMode}"]`).classList.add('active');

            if (newMode === 'sticker') {
                stickerPalette.classList.add('show');
                statusEl.textContent = '🏷️ 스티커 모드. 스티커를 선택하고 두 손가락으로 배치하세요!';
            } else {
                stickerPalette.classList.remove('show');
                statusEl.textContent = '🖌️ 그리기 모드. 손가락을 펼치면 그립니다!';
            }
        }

        // 스티커 선택
        function selectSticker(stickerType) {
            selectedSticker = stickerType;
            document.querySelectorAll('.sticker-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.querySelector(`[data-sticker="${stickerType}"]`).classList.add('selected');
            statusEl.textContent = `✅ ${stickerType} 선택됨. 핀치 제스처로 배치하세요!`;
        }

        // 핀치 제스처 감지 (검지와 중지 사이의 거리)
        function detectPinch(landmarks) {
            const indexTip = landmarks[8]; // 검지 끝
            const middleTip = landmarks[12]; // 중지 끝

            const distance = Math.sqrt(
                Math.pow(indexTip.x - middleTip.x, 2) +
                Math.pow(indexTip.y - middleTip.y, 2)
            );

            if (distance < 0.05) {
                // 핀치 위치는 두 손가락의 중간점
                const pinchX = (indexTip.x + middleTip.x) / 2;
                const pinchY = (indexTip.y + middleTip.y) / 2;
                return { isPinch: true, x: pinchX, y: pinchY };
            }
            return { isPinch: false };
        }

        // 스티커 추가
        function addSticker(normX, normY, stickerType) {
            const x = normX * stickerCanvas.width;
            const y = normY * stickerCanvas.height;
            stickers.push({ x, y, type: stickerType });
            drawAllStickers();
        }

        // 모든 스티커 렌더링
        function drawAllStickers() {
            stickerCtx.clearRect(0, 0, stickerCanvas.width, stickerCanvas.height);
            stickers.forEach(sticker => {
                drawSticker(sticker.x, sticker.y, sticker.type);
            });
        }

        // 단일 스티커 렌더링
        function drawSticker(x, y, type) {
            const size = 40;
            stickerCtx.save();
            stickerCtx.translate(x, y);

            if (type === 'heart') {
                // 하트 ❤️
                stickerCtx.fillStyle = '#ff69b4';
                stickerCtx.beginPath();
                stickerCtx.moveTo(0, -size / 2);
                stickerCtx.bezierCurveTo(-size / 2, -size, -size, -size / 2, 0, 0);
                stickerCtx.bezierCurveTo(size, -size / 2, size / 2, -size, 0, -size / 2);
                stickerCtx.fill();
            } else if (type === 'star') {
                // 별 ⭐
                stickerCtx.fillStyle = '#ffd700';
                drawStar(stickerCtx, 0, 0, 5, size / 2, size / 4);
            } else if (type === 'hamburger') {
                // 햄버거 🍔
                stickerCtx.fillStyle = '#d2691e';
                stickerCtx.fillRect(-size / 2, -size / 2, size, size / 3); // 빵 위
                stickerCtx.fillStyle = '#ff6347';
                stickerCtx.fillRect(-size / 2, -size / 3, size, size / 6); // 토마토
                stickerCtx.fillStyle = '#228b22';
                stickerCtx.fillRect(-size / 2, -size / 6, size, size / 6); // 상추
                stickerCtx.fillStyle = '#daa520';
                stickerCtx.fillRect(-size / 2, 0, size, size / 6); // 치즈
                stickerCtx.fillStyle = '#8b4513';
                stickerCtx.fillRect(-size / 2, size / 6, size, size / 3); // 빵 아래
            } else if (type === 'cat') {
                // 고양이입 😸
                stickerCtx.fillStyle = '#ffa500';
                stickerCtx.beginPath();
                stickerCtx.arc(0, 0, size / 2, 0, Math.PI * 2);
                stickerCtx.fill();
                // 귀
                stickerCtx.beginPath();
                stickerCtx.moveTo(-size / 3, -size / 2);
                stickerCtx.lineTo(-size / 2, -size);
                stickerCtx.lineTo(-size / 5, -size / 2);
                stickerCtx.fill();
                stickerCtx.beginPath();
                stickerCtx.moveTo(size / 3, -size / 2);
                stickerCtx.lineTo(size / 2, -size);
                stickerCtx.lineTo(size / 5, -size / 2);
                stickerCtx.fill();
                // 입
                stickerCtx.strokeStyle = '#000';
                stickerCtx.lineWidth = 2;
                stickerCtx.beginPath();
                stickerCtx.moveTo(-size / 4, size / 4);
                stickerCtx.quadraticCurveTo(0, size / 2, size / 4, size / 4);
                stickerCtx.stroke();
            }

            stickerCtx.restore();
        }

        // 별 그리기 헬퍼
        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius) {
            let rot = Math.PI / 2 * 3;
            let step = Math.PI / spikes;
            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                ctx.lineTo(cx + Math.cos(rot) * outerRadius, cy + Math.sin(rot) * outerRadius);
                rot += step;
                ctx.lineTo(cx + Math.cos(rot) * innerRadius, cy + Math.sin(rot) * innerRadius);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fill();
        }

        // 초기화
        function clearCanvas() {
            drawCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
            stickerCtx.clearRect(0, 0, stickerCanvas.width, stickerCanvas.height);
            pointHistory = [];
            stickers = [];
            floatingSticker = null;
            isDrawing = false;
            isPinching = false;
            downloadBtn.disabled = true;
            statusEl.textContent = '✋ 초기화 완료. 다시 시작하세요!';
        }

        // 다운로드
        function downloadDrawing() {
            const link = document.createElement('a');
            link.href = drawingCanvas.toDataURL('image/png');
            link.download = `drawing_${Date.now()}.png`;
            link.click();
        }

        // 카메라 중지
        function stopCamera() {
            isRunning = false;
            video.srcObject.getTracks().forEach(track => track.stop());
            startBtn.disabled = false;
            stopBtn.disabled = true;
            clearBtn.disabled = true;
            statusEl.textContent = '중지됨';
            statusEl.className = 'status idle';
        }

        // 이벤트 리스너
        startBtn.addEventListener('click', startCamera);
        stopBtn.addEventListener('click', stopCamera);
        clearBtn.addEventListener('click', clearCanvas);
        downloadBtn.addEventListener('click', downloadDrawing);

        // 모드 탭
        document.querySelectorAll('.mode-tab').forEach(btn => {
            btn.addEventListener('click', (e) => {
                switchMode(e.target.dataset.mode);
            });
        });

        // 스티커 버튼
        document.querySelectorAll('.sticker-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                selectSticker(e.target.dataset.sticker);
            });
        });

        // 초기 로드
        window.addEventListener('load', initMediaPipe);
    </script>
</body>
</html>
