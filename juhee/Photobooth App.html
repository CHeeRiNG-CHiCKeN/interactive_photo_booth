<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photobooth · Frozen</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --accent: #8AD0EC;
            --ink: #EAF4FA;
            --muted: rgba(234, 244, 250, 0.6);
            --glass-bg: rgba(14, 26, 40, 0.5);
            --glass-border: rgba(180, 220, 245, 0.18);
            --glass-shadow: 0 10px 40px rgba(0, 20, 40, 0.5);
        }

        html, body { height: 100%; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #000;
            color: var(--ink);
            overflow: hidden;
        }

        /* ===== Fullscreen 카메라 무대 ===== */
        #stage {
            position: fixed;
            inset: 0;
            background: #000;
            overflow: hidden;
        }

        .video-wrapper {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #video, #canvas, #drawingCanvas, #objectCanvas, #stickerCanvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #video { display: none; }
        #canvas { z-index: 1; }
        #drawingCanvas { z-index: 2; }
        #objectCanvas { z-index: 3; }
        #stickerCanvas { z-index: 4; }

        #startHint {
            position: absolute;
            inset: 0;
            z-index: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.35);
            font-size: 1.1rem;
            letter-spacing: 0.04em;
        }

        /* ===== HUD 컨테이너 (포지셔닝 전용) ===== */
        .hud {
            position: fixed;
            z-index: 20;
            pointer-events: none;
        }
        .hud > * { pointer-events: auto; }

        .hud-actions { top: 16px; left: 16px; }
        .hud-left    { top: 70px; left: 16px; }
        .hud-right   { top: 50%; right: 16px; transform: translateY(-50%); }
        .hud-bottom  { bottom: 22px; left: 50%; transform: translateX(-50%); }
        .hud-status  { bottom: 22px; right: 16px; max-width: 320px; }

        /* ===== 글래스 패널 공통 ===== */
        .controls,
        .settings-panel,
        .mode-tabs,
        .sticker-palette.show,
        .hud-status .glass-card {
            background: var(--glass-bg);
            -webkit-backdrop-filter: blur(18px) saturate(140%);
            backdrop-filter: blur(18px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            box-shadow: var(--glass-shadow);
        }

        /* ===== 액션 버튼 (상단 좌측) ===== */
        .controls {
            display: flex;
            gap: 6px;
            padding: 6px;
        }
        .controls button {
            padding: 8px 14px;
            border: none;
            border-radius: 11px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.18s;
            color: var(--ink);
            background: rgba(255, 255, 255, 0.08);
        }
        .controls .btn-primary {
            background: var(--accent);
            color: #0E2A3D;
        }
        .controls .btn-primary:hover { filter: brightness(1.07); }
        .controls .btn-secondary:hover { background: rgba(255, 255, 255, 0.16); }
        .controls button:disabled { opacity: 0.4; cursor: not-allowed; }

        /* ===== 설정 패널 (좌측 상단) ===== */
        .settings-panel {
            width: 232px;
            max-height: calc(100vh - 96px);
            overflow-y: auto;
            padding: 16px;
        }
        .settings-panel::-webkit-scrollbar { width: 0; }
        .settings-panel { scrollbar-width: none; }

        .setting-group {
            padding-bottom: 14px;
            margin-bottom: 14px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .setting-group:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .setting-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--ink);
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .setting-value { font-size: 0.75rem; color: var(--accent); font-weight: 600; }
        .hint-text { font-size: 0.68rem; color: var(--muted); margin-top: 4px; }

        input[type="range"] {
            width: 100%;
            height: 5px;
            border-radius: 3px;
            background: rgba(255, 255, 255, 0.16);
            outline: none;
            -webkit-appearance: none;
            appearance: none;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px; height: 15px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
        }
        input[type="range"]::-moz-range-thumb {
            width: 15px; height: 15px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
        }
        input[type="color"] {
            width: 100%;
            height: 34px;
            border: 1px solid rgba(255, 255, 255, 0.16);
            border-radius: 9px;
            cursor: pointer;
            background: transparent;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 9px;
            font-size: 0.8rem;
            color: var(--ink);
        }
        input[type="checkbox"] {
            width: 17px; height: 17px;
            cursor: pointer;
            accent-color: var(--accent);
        }

        /* 브러쉬 선택 */
        .brush-picker {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 6px;
            margin-bottom: 4px;
        }
        .brush-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 9px 4px;
            background: rgba(255, 255, 255, 0.06);
            border: 1.5px solid rgba(255, 255, 255, 0.12);
            border-radius: 10px;
            cursor: pointer;
            font: inherit;
            transition: all 0.16s;
        }
        .brush-option:hover { background: rgba(255, 255, 255, 0.12); }
        .brush-option.active {
            border-color: var(--accent);
            background: rgba(138, 208, 236, 0.18);
        }
        .brush-icon { font-size: 20px; line-height: 1; color: var(--ink); }
        .brush-name {
            font-size: 0.66rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
        }
        .brush-option.active .brush-name { color: var(--accent); }

        /* 색상 프리셋 */
        .preset-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .color-swatches { gap: 10px; }
        .preset-btn.swatch {
            flex: 0 0 auto;
            min-width: 0;
            width: 38px;
            height: 38px;
            padding: 0;
            border-radius: 50%;
            background: var(--sw);
            border: 2px solid rgba(255, 255, 255, 0.35);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
            transition: transform 0.16s, border-color 0.16s;
        }
        .preset-btn.swatch:hover {
            transform: scale(1.12);
            border-color: #fff;
            background: var(--sw);
        }
        .preset-btn.swatch.selected {
            border-color: #fff;
            box-shadow: 0 0 0 2px var(--sw), 0 2px 10px rgba(0, 0, 0, 0.4);
        }
        .preset-btn {
            flex: 1;
            min-width: 60px;
            padding: 6px 8px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.06);
            color: var(--ink);
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.72rem;
            transition: all 0.16s;
        }
        .preset-btn:hover { background: rgba(255, 255, 255, 0.14); border-color: var(--accent); }

        /* 커스텀 스티커 입력 */
        .text-input {
            width: 100%;
            padding: 7px 9px;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 8px;
            color: var(--ink);
            font-size: 0.78rem;
            margin-bottom: 6px;
            outline: none;
        }
        .text-input::placeholder { color: var(--muted); }
        .add-btn {
            width: 100%;
            padding: 7px 10px;
            background: var(--accent);
            color: #0E2A3D;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.78rem;
            font-weight: 600;
        }

        /* 기타 토글 */
        .toggle-btn {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid rgba(255, 255, 255, 0.14);
            background: rgba(255, 255, 255, 0.05);
            color: var(--ink);
            border-radius: 9px;
            cursor: pointer;
            font-size: 0.76rem;
            transition: all 0.16s;
            margin-bottom: 6px;
        }
        .toggle-btn:last-child { margin-bottom: 0; }
        .toggle-btn:hover { background: rgba(255, 255, 255, 0.13); }

        /* ===== 모드 탭 (하단 중앙) ===== */
        .mode-tabs {
            display: flex;
            gap: 5px;
            padding: 6px;
        }
        .mode-tab {
            padding: 10px 22px;
            background: transparent;
            color: var(--ink);
            border: none;
            border-radius: 11px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.18s;
        }
        .mode-tab:hover { background: rgba(255, 255, 255, 0.1); }
        .mode-tab.active {
            background: var(--accent);
            color: #0E2A3D;
        }

        /* ===== 스티커 팔레트 (우측 중앙, 세로) ===== */
        .sticker-palette {
            display: none;
            flex-direction: column;
            gap: 6px;
            padding: 8px;
            max-height: 80vh;
            overflow-y: auto;
            scrollbar-width: none;
        }
        .sticker-palette::-webkit-scrollbar { width: 0; }
        .sticker-palette.show { display: flex; }
        .sticker-btn {
            font-size: 30px;
            line-height: 1;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.16s;
        }
        .sticker-btn:hover { transform: scale(1.08); background: rgba(255, 255, 255, 0.13); }
        .sticker-btn.selected { border-color: var(--accent); background: rgba(138, 208, 236, 0.2); }
        .sticker-btn.hovering { transform: scale(1.12); border-color: var(--accent); background: rgba(138, 208, 236, 0.28); }

        /* ===== 상태 (우측 하단) ===== */
        .hud-status .glass-card { padding: 12px 14px; }
        .status {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--ink);
        }
        .status.drawing { color: #9FD9A6; }
        .status.idle { color: var(--accent); }
        .help {
            margin-top: 8px;
            font-size: 0.68rem;
            line-height: 1.55;
            color: var(--muted);
        }

        @media (max-width: 720px) {
            .settings-panel { width: 200px; }
            .hud-status { max-width: 240px; }
            .sticker-btn { width: 48px; height: 48px; font-size: 26px; }
        }
    </style>
</head>
<body>
    <!-- ===== Fullscreen 카메라 ===== -->
    <div id="stage">
        <div class="video-wrapper">
            <video id="video"></video>
            <canvas id="canvas"></canvas>
            <canvas id="drawingCanvas"></canvas>
            <canvas id="objectCanvas"></canvas>
            <canvas id="stickerCanvas"></canvas>
        </div>
        <div id="startHint">❄ Press Start</div>
    </div>

    <!-- ===== 상단 좌측: 액션 버튼 ===== -->
    <div class="hud hud-actions">
        <div class="controls">
            <button class="btn-primary" id="startBtn">Start</button>
            <button class="btn-secondary" id="clearBtn" disabled>Clear</button>
            <button class="btn-secondary" id="downloadBtn" disabled>Save</button>
        </div>
    </div>

    <!-- ===== 좌측 상단: 브러쉬/색상/설정 ===== -->
    <div class="hud hud-left">
        <div class="settings-panel">
            <!-- 드로잉 옵션 -->
            <div class="setting-group" id="drawingSettings">
                <div class="setting-label">Brush</div>
                <div class="brush-picker" id="brushPicker">
                    <button class="brush-option active" data-brush="snow">
                        <span class="brush-icon">❄</span>
                        <span class="brush-name">Snow</span>
                    </button>
                    <button class="brush-option" data-brush="glitter">
                        <span class="brush-icon">✦</span>
                        <span class="brush-name">Glitter</span>
                    </button>
                </div>

                <!-- 숨김: 선 색상 직접 선택 / 선 두께 / 그림자 / 하이라이트 (JS 참조용으로 DOM 유지) -->
                <input type="color" id="lineColor" value="#8AD0EC" style="display: none;">
                <input type="range" id="lineWidth" min="5" max="60" value="30" step="1" style="display: none;">
                <span id="lineWidthValue" style="display: none;">30</span>
                <input type="checkbox" id="showShadow" checked style="display: none;">
                <input type="checkbox" id="showHighlight" checked style="display: none;">

                <div class="setting-label" style="margin-top: 14px;">Color</div>
                <div class="preset-buttons color-swatches">
                    <button class="preset-btn swatch" data-preset="ice"      style="--sw:#8AD0EC;" title="얼음"></button>
                    <button class="preset-btn swatch" data-preset="snow"     style="--sw:#FFFFFF;" title="눈"></button>
                    <button class="preset-btn swatch" data-preset="lavender" style="--sw:#B8A6E6;" title="라벤더"></button>
                    <button class="preset-btn swatch" data-preset="deep"     style="--sw:#4F8FD6;" title="깊은 파랑"></button>
                </div>
            </div>

            <!-- 숨김: 손 인식 감도 / 포인트 히스토리 (JS 참조용 DOM 유지, 값 고정) -->
            <div class="setting-group" style="display: none;">
                <span class="setting-value" id="sensitivityValue">0.01</span>
                <input type="range" id="sensitivity" min="0.01" max="0.1" value="0.01" step="0.01">
                <span class="setting-value" id="historyValue">15</span>
                <input type="range" id="history" min="2" max="15" value="15" step="1">
            </div>

            <!-- 숨김: 스티커 크기 / 핀치 감도 / 커스텀 스티커 (JS 참조용 DOM 유지, 값 고정) -->
            <div class="setting-group" id="stickerSettings" style="display: none;">
                <span class="setting-value" id="stickerSizeValue">60</span>
                <input type="range" id="stickerSize" min="20" max="80" value="60" step="5">
                <span class="setting-value" id="pinchValue">0.08</span>
                <input type="range" id="pinchSensitivity" min="0.02" max="0.12" value="0.08" step="0.01">
                <input type="checkbox" id="customStickerEnabled">
                <div id="customStickerInput" style="display: none;">
                    <input type="text" id="customStickerEmoji" class="text-input">
                    <input type="text" id="customStickerName" class="text-input">
                    <button class="add-btn">추가</button>
                </div>
            </div>

            <!-- 숨김: 기타 (JS 참조용 DOM 유지) -->
            <div class="setting-group" style="display: none;">
                <div class="toggle-btn" id="resetSettings">복원</div>
                <div class="toggle-btn" id="exportSettings">저장</div>
                <div class="toggle-btn" id="importSettings">불러오기</div>
            </div>
        </div>
    </div>

    <!-- ===== 우측 중앙: 스티커 팔레트 (세로) ===== -->
    <div class="hud hud-right">
        <div class="sticker-palette" id="stickerPalette"></div>
    </div>

    <!-- ===== 하단 중앙: 모드 탭 ===== -->
    <div class="hud hud-bottom">
        <div class="mode-tabs">
            <button class="mode-tab active" data-mode="draw">Draw</button>
            <button class="mode-tab" data-mode="sticker">Sticker</button>
        </div>
    </div>

    <!-- ===== 우측 하단: 상태 ===== -->
    <div class="hud hud-status">
        <div class="glass-card">
            <div class="status idle" id="status">Loading...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>

    <script>
        // ===== DOM 요소 =====
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const drawingCanvas = document.getElementById('drawingCanvas');
        const stickerCanvas = document.getElementById('stickerCanvas');
        const ctx = canvas.getContext('2d');
        const drawCtx = drawingCanvas.getContext('2d');
        const objectCanvas = document.getElementById('objectCanvas');
        const objectCtx = objectCanvas.getContext('2d');
        const stickerCtx = stickerCanvas.getContext('2d');
        // 진행 중인 선을 담는 오프스크린 버퍼 (닫히면 잘라서 물체로 베이크)
        const ipCanvas = document.createElement('canvas');
        const ipCtx = ipCanvas.getContext('2d');
        // 브러쉬가 그릴 대상 ctx (그리는 중엔 ipCtx로 전환)
        let brushCtx = drawCtx;

        const startBtn = document.getElementById('startBtn');
        const clearBtn = document.getElementById('clearBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusEl = document.getElementById('status');
        const stickerPalette = document.getElementById('stickerPalette');

        // 설정 요소들
        const lineColorInput = document.getElementById('lineColor');
        const lineWidthInput = document.getElementById('lineWidth');
        const lineWidthValue = document.getElementById('lineWidthValue');
        const showShadowCheckbox = document.getElementById('showShadow');
        const showHighlightCheckbox = document.getElementById('showHighlight');
        const sensitivityInput = document.getElementById('sensitivity');
        const sensitivityValue = document.getElementById('sensitivityValue');
        const historyInput = document.getElementById('history');
        const historyValue = document.getElementById('historyValue');
        const stickerSizeInput = document.getElementById('stickerSize');
        const stickerSizeValue = document.getElementById('stickerSizeValue');
        const pinchInput = document.getElementById('pinchSensitivity');
        const pinchValue = document.getElementById('pinchValue');

        // ===== 설정 객체 =====
        const DEFAULT_SETTINGS = {
            brushType: 'snow',
            lineColor: '#8AD0EC',
            lineWidth: 30,
            showShadow: true,
            showHighlight: true,
            sensitivity: 0.01,
            history: 15,
            stickerSize: 60,
            pinchSensitivity: 0.08,
            stickers: [
                { type: 'snowflake',  emoji: '❄️',  name: 'snowflake' },
                { type: 'snowman',    emoji: '⛄',  name: 'snowman' },
                { type: 'snowcloud',  emoji: '🌨️',  name: 'snowcloud' },
                { type: 'crown',      emoji: '👑',  name: 'crown' },
                { type: 'castle',     emoji: '🏰',  name: 'castle' },
                { type: 'reindeer',   emoji: '🦌',  name: 'reindeer' },
                { type: 'ice',        emoji: '🧊',  name: 'ice' },
                { type: 'diamond',    emoji: '💎',  name: 'diamond' },
                { type: 'sparkle',    emoji: '✨',  name: 'sparkle' },
                { type: 'star',       emoji: '⭐',  name: 'star' },
                { type: 'snowflake2', emoji: '❄',  name: 'snowflake2' },
                { type: 'whiteheart', emoji: '🤍',  name: 'whiteheart' }
            ]
        };

        let settings = { ...DEFAULT_SETTINGS, stickers: [...DEFAULT_SETTINGS.stickers] };

        // ===== 상태 변수 =====
        let handLandmarker = null;
        let isRunning = false;
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let pointHistory = [];
        let lastSmoothX = null;
        let lastSmoothY = null;
        let currentStrokePts = [];   // 진행 중 선의 전체 경로 (루프 닫힘 판정용)
        let strokeLeftStart = false; // 시작점에서 충분히 멀어졌는지
        let drawnObjects = [];       // 움직일 수 있는 물체들 { canvas, x, y, w, h }
        let grabbedObject = null;    // 현재 잡고 있는 물체
        let grabDX = 0, grabDY = 0;  // 잡은 지점과 물체 원점의 오프셋
        let mode = 'draw';
        let selectedSticker = null;
        let stickers = [];
        let floatingSticker = null;
        let isPinching = false;

        // ===== 양손 지원: 손별 상태를 전역에 스왑 인/아웃 =====
        // 기존 헬퍼(drawSmoothLine, finalizeObject 등)는 전역 변수를 쓰므로,
        // 각 손을 처리하기 전에 그 손의 상태를 전역으로 불러오고, 끝나면 저장한다.
        const handStates = {};
        let currentHandId = 0;

        function getHandState(id) {
            if (!handStates[id]) {
                handStates[id] = {
                    isDrawing: false, lastX: 0, lastY: 0,
                    pointHistory: [], lastSmoothX: null, lastSmoothY: null,
                    currentStrokePts: [], strokeLeftStart: false,
                    grabbedObject: null, grabDX: 0, grabDY: 0,
                    floatingSticker: null, isPinching: false
                };
            }
            return handStates[id];
        }

        function loadHandGlobals(st) {
            isDrawing = st.isDrawing; lastX = st.lastX; lastY = st.lastY;
            pointHistory = st.pointHistory; lastSmoothX = st.lastSmoothX; lastSmoothY = st.lastSmoothY;
            currentStrokePts = st.currentStrokePts; strokeLeftStart = st.strokeLeftStart;
            grabbedObject = st.grabbedObject; grabDX = st.grabDX; grabDY = st.grabDY;
            floatingSticker = st.floatingSticker; isPinching = st.isPinching;
        }

        function saveHandGlobals(st) {
            st.isDrawing = isDrawing; st.lastX = lastX; st.lastY = lastY;
            st.pointHistory = pointHistory; st.lastSmoothX = lastSmoothX; st.lastSmoothY = lastSmoothY;
            st.currentStrokePts = currentStrokePts; st.strokeLeftStart = strokeLeftStart;
            st.grabbedObject = grabbedObject; st.grabDX = grabDX; st.grabDY = grabDY;
            st.floatingSticker = floatingSticker; st.isPinching = isPinching;
        }

        // 다른 손이 이미 잡고 있는 물체인지 확인 (양손이 같은 물체를 잡는 것 방지)
        function objectGrabbedByOther(obj, selfId) {
            for (const id in handStates) {
                if (Number(id) === selfId) continue;
                if (handStates[id].grabbedObject === obj) return true;
            }
            return false;
        }

        // ===== 손바닥 펼침(지우개) 감지: 네 손가락 모두 펴고 벌어졌을 때 =====
        function isPalmOpen(lm) {
            const wrist = lm[0];
            const d = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
            const main = [[8, 6], [12, 10], [16, 14], [20, 18]]; // 검지~새끼: tip vs pip
            let ext = 0;
            for (const [tip, pip] of main) {
                if (d(lm[tip], wrist) > d(lm[pip], wrist) * 1.15) ext++;
            }
            const spread = d(lm[8], lm[20]);   // 검지끝 ~ 새끼끝
            const palmW = d(lm[5], lm[17]);    // 검지밑 ~ 새끼밑 (손바닥 폭)
            return ext === 4 && spread > palmW * 1.15;
        }

        // 손 윤곽 폴리곤 (캔버스 좌표, 미러링 적용)
        function palmPolygon(lm, W, H) {
            const order = [0, 1, 2, 4, 8, 12, 16, 20, 17, 13, 9, 5];
            return order.map(i => ({ x: (1 - lm[i].x) * W, y: lm[i].y * H }));
        }

        function pointInPoly(px, py, poly) {
            let inside = false;
            for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
                const xi = poly[i].x, yi = poly[i].y, xj = poly[j].x, yj = poly[j].y;
                const intersect = ((yi > py) !== (yj > py)) &&
                    (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }

        function erasePolyOnCtx(c, poly, ox, oy) {
            c.save();
            c.globalCompositeOperation = 'destination-out';
            c.beginPath();
            poly.forEach((p, i) => i === 0
                ? c.moveTo(p.x + ox, p.y + oy)
                : c.lineTo(p.x + ox, p.y + oy));
            c.closePath();
            c.fill();
            c.restore();
        }

        // 손바닥 중심 + 반경 (캔버스 좌표, 미러링 적용) — 깔끔한 원형 포인터
        function palmCenterRadius(lm, W, H) {
            const base = [0, 5, 9, 13, 17];
            let cx = 0, cy = 0;
            base.forEach(i => { cx += (1 - lm[i].x) * W; cy += lm[i].y * H; });
            cx /= base.length; cy /= base.length;
            const pts = [0, 4, 8, 12, 16, 20];
            let r = 0;
            pts.forEach(i => {
                const ddx = (1 - lm[i].x) * W - cx, ddy = lm[i].y * H - cy;
                r = Math.max(r, Math.hypot(ddx, ddy));
            });
            return { cx, cy, r: r * 0.85 };
        }

        function eraseCircleOnCtx(c, cx, cy, r, ox, oy) {
            c.save();
            c.globalCompositeOperation = 'destination-out';
            c.beginPath();
            c.arc(cx + ox, cy + oy, r, 0, Math.PI * 2);
            c.fill();
            c.restore();
        }

        // 손바닥 면적만큼 모든 레이어(그림/물체/스티커) 지우기
        function erasePalm(lm) {
            const W = drawingCanvas.width, H = drawingCanvas.height;
            const { cx, cy, r } = palmCenterRadius(lm, W, H);
            eraseCircleOnCtx(drawCtx, cx, cy, r, 0, 0);   // 영구 드로잉
            eraseCircleOnCtx(ipCtx, cx, cy, r, 0, 0);     // 진행 중 선
            for (const o of drawnObjects) {                // 움직이는 물체 (로컬 좌표)
                eraseCircleOnCtx(o.canvas.getContext('2d'), cx, cy, r, -o.x, -o.y);
            }
            // 원 안에 들어온 스티커 제거
            const before = stickers.length;
            stickers = stickers.filter(s => Math.hypot(s.x - cx, s.y - cy) > r);
            if (stickers.length !== before) drawAllStickers();
        }

        // 지우개 손 시각 표시 (부드러운 원형)
        function drawEraserCursor(lm) {
            const W = canvas.width, H = canvas.height;
            const { cx, cy, r } = palmCenterRadius(lm, W, H);
            ctx.save();
            const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
            g.addColorStop(0, 'rgba(255,255,255,0.22)');
            g.addColorStop(1, 'rgba(255,255,255,0.05)');
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(cx, cy, r, 0, Math.PI * 2);
            ctx.fill();
            ctx.lineWidth = 3;
            ctx.strokeStyle = 'rgba(180, 220, 245, 0.85)';
            ctx.stroke();
            ctx.restore();
        }

        // ===== LocalStorage 관리 =====
        function saveSettings() {
            localStorage.setItem('photoboothSettings', JSON.stringify(settings));
        }

        function loadSettings() {
            const saved = localStorage.getItem('photoboothSettings');
            if (saved) {
                const loaded = JSON.parse(saved);
                settings = { ...DEFAULT_SETTINGS, ...loaded };
            }
            // 잠금: 아래 값들은 UI에서 숨겼으므로 저장본과 무관하게 항상 고정
            settings.brushType = (['snow', 'glitter'].includes(settings.brushType)) ? settings.brushType : 'snow';
            settings.lineWidth = 30;
            settings.sensitivity = 0.01;
            settings.history = 15;
            settings.stickerSize = 60;
            settings.pinchSensitivity = 0.08;
            // 색상은 4가지 프리셋 중 하나만 허용 (이전 값이 다르면 얼음색으로)
            const allowed = ['#8AD0EC', '#FFFFFF', '#B8A6E6', '#4F8FD6'];
            if (!allowed.includes((settings.lineColor || '').toUpperCase())) {
                settings.lineColor = '#8AD0EC';
            }
            // 스티커는 겨울왕국 세트로 고정 (이전 저장본 무시)
            settings.stickers = [...DEFAULT_SETTINGS.stickers];
            applySettings();
        }

        function applySettings() {
            lineColorInput.value = settings.lineColor;
            lineWidthInput.value = settings.lineWidth;
            lineWidthValue.textContent = settings.lineWidth;
            showShadowCheckbox.checked = settings.showShadow;
            showHighlightCheckbox.checked = settings.showHighlight;

            sensitivityValue.textContent = settings.sensitivity;
            historyInput.value = settings.history;
            historyValue.textContent = settings.history;

            stickerSizeValue.textContent = settings.stickerSize;

                b.classList.toggle('active', b.dataset.brush === settings.brushType);

        }

        // ===== 설정 이벤트 리스너 =====

        // 브러쉬 종류 선택
        document.querySelectorAll('.brush-option').forEach(btn => {

        // 현재 색상에 해당하는 스와치를 선택 상태로 표시
        function syncSwatchSelection() {
            const map = { '#8AD0EC': 'ice', '#FFFFFF': 'snow', '#B8A6E6': 'lavender', '#4F8FD6': 'deep' };
            const key = map[(settings.lineColor || '').toUpperCase()];
            document.querySelectorAll('.preset-btn.swatch').forEach(b => {
                b.classList.toggle('selected', b.dataset.preset === key);
            });
        }

        function applyPreset(preset) {
            const presets = {
                ice: '#8AD0EC',
                snow: '#FFFFFF',
                lavender: '#B8A6E6',
                deep: '#4F8FD6'
            };
            if (presets[preset]) {

                lineColorInput.value = settings.lineColor;

        // 초기 설정 복원
        document.getElementById('resetSettings').addEventListener('click', () => {
            if (confirm('초기 설정으로 복원하시겠습니까?')) {
                settings = { ...DEFAULT_SETTINGS, stickers: [...DEFAULT_SETTINGS.stickers] };
                applySettings();
                saveSettings();

            }

        // 설정 저장
        document.getElementById('exportSettings').addEventListener('click', () => {
            const dataStr = JSON.stringify(settings, null, 2);

        // 설정 불러오기
        document.getElementById('importSettings').addEventListener('click', () => {

                    try {
                        settings = JSON.parse(event.target.result);
                        applySettings();
                        saveSettings();
                        alert('설정이 불러와졌습니다.');
                    } catch (error) {

        // ===== 스티커 팔레트 렌더링 =====
        function renderStickerPalette() {
            stickerPalette.innerHTML = '';
            settings.stickers.forEach(sticker => {
                const btn = document.createElement('button');
                btn.className = 'sticker-btn';
                btn.textContent = sticker.emoji;
                btn.dataset.sticker = sticker.name;
                btn.addEventListener('click', () => selectSticker(sticker.name));
                stickerPalette.appendChild(btn);

        }

        // ===== MediaPipe 초기화 =====
        async function initMediaPipe() {
            try {
                const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0');
                const FilesetResolver = vision.FilesetResolver;
                const HandLandmarker = vision.HandLandmarker;

                handLandmarker = await HandLandmarker.createFromOptions(
                    await FilesetResolver.forVisionTasks(
                        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm'
                    ),
                    {
                        baseOptions: {
                            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task'
                        },
                        runningMode: 'VIDEO',
                        numHands: 2
                    }
                );
                console.log('✅ MediaPipe HandLandmarker 로드 완료');
                statusEl.textContent = 'Ready — press Start';
            } catch (error) {
                console.error('❌ MediaPipe 로드 실패:', error);
                statusEl.textContent = 'Error: failed to load';
            }
        }

        // ===== 카메라 시작 =====
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 1280 }, height: { ideal: 720 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    video.play();
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    drawingCanvas.width = video.videoWidth;
                    drawingCanvas.height = video.videoHeight;
                    objectCanvas.width = video.videoWidth;
                    objectCanvas.height = video.videoHeight;
                    ipCanvas.width = video.videoWidth;
                    ipCanvas.height = video.videoHeight;
                    stickerCanvas.width = video.videoWidth;
                    stickerCanvas.height = video.videoHeight;
                    isRunning = true;
                    startBtn.textContent = 'Stop';
                    clearBtn.disabled = false;
                    statusEl.textContent = 'Ready — open your hand to draw';
                    statusEl.className = 'status idle';
                    processFrame();
                };
            } catch (err) {
                alert('카메라에 접근할 수 없습니다: ' + err.message);
            }
        }

        // ===== 손 상태 감지 =====
        function isHandOpen(landmarks) {
            const tipIndex = 8;
            const pipIndex = 7;
            const distance = Math.sqrt(
                Math.pow(landmarks[tipIndex].x - landmarks[pipIndex].x, 2) +
                Math.pow(landmarks[tipIndex].y - landmarks[pipIndex].y, 2)
            );
            return distance > settings.sensitivity;
        }

        // ===== Catmull-Rom Spline =====
        function catmullRom(p0, p1, p2, p3, t) {
            const t2 = t * t;
            const t3 = t2 * t;
            return 0.5 * (
                2 * p1 +
                (-p0 + p2) * t +
                (2 * p0 - 5 * p1 + 4 * p2 - p3) * t2 +
                (-p0 + 3 * p1 - 3 * p2 + p3) * t3
            );
        }

        
        // ===== 브러쉬 렌더러 (basic / crayon / glitter / neon) =====
        function strokeBetween(ctx, x1, y1, x2, y2) {
            ctx.beginPath();
            ctx.moveTo(x1, y1);
            ctx.lineTo(x2, y2);
            ctx.stroke();
        }

        function drawBasicSegment(x1, y1, x2, y2) {
            // shadow
            if (settings.showShadow) {
                brushCtx.shadowBlur = 0;
                brushCtx.strokeStyle = 'rgba(58, 46, 38, 0.18)';
                brushCtx.lineWidth = settings.lineWidth + 6;
                brushCtx.lineCap = 'round';
                brushCtx.lineJoin = 'round';
                strokeBetween(brushCtx, x1 + 2, y1 + 3, x2 + 2, y2 + 3);
            }
            // main
            brushCtx.strokeStyle = settings.lineColor;
            brushCtx.lineWidth = settings.lineWidth;
            brushCtx.lineCap = 'round';
            brushCtx.lineJoin = 'round';
            strokeBetween(brushCtx, x1, y1, x2, y2);
            // highlight
            if (settings.showHighlight) {
                brushCtx.strokeStyle = 'rgba(255, 255, 255, 0.35)';
                brushCtx.lineWidth = settings.lineWidth * 0.35;
                strokeBetween(brushCtx, x1 - 1.5, y1 - 2, x2 - 1.5, y2 - 2);
            }
        }

        function drawCrayonSegment(x1, y1, x2, y2) {
            brushCtx.shadowBlur = 0;
            brushCtx.lineCap = 'round';
            brushCtx.lineJoin = 'round';
            // soft pastel base
            brushCtx.globalAlpha = 0.55;
            brushCtx.strokeStyle = settings.lineColor;
            brushCtx.lineWidth = settings.lineWidth;
            strokeBetween(brushCtx, x1, y1, x2, y2);
            // jittered side passes for "skip" texture
            brushCtx.globalAlpha = 0.32;
            brushCtx.lineWidth = settings.lineWidth * 0.75;
            for (let k = 0; k < 3; k++) {
                const jx = (Math.random() - 0.5) * 2.5;
                const jy = (Math.random() - 0.5) * 2.5;
                strokeBetween(brushCtx, x1 + jx, y1 + jy, x2 + jx, y2 + jy);
            }
            // grain speckles
            brushCtx.globalAlpha = 1;
            brushCtx.fillStyle = settings.lineColor;
            const dx = x2 - x1, dy = y2 - y1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const steps = Math.max(1, Math.floor(dist / 2));
            for (let i = 0; i < steps; i++) {
                const t = i / steps;
                const cx = x1 + dx * t, cy = y1 + dy * t;
                for (let k = 0; k < 2; k++) {
                    const a = Math.random() * Math.PI * 2;
                    const r = Math.random() * (settings.lineWidth * 0.55);
                    const px = cx + Math.cos(a) * r;
                    const py = cy + Math.sin(a) * r;
                    const sz = Math.random() * 1.6 + 0.4;
                    brushCtx.globalAlpha = Math.random() * 0.55 + 0.15;
                    brushCtx.fillRect(px, py, sz, sz);
                }
            }
            brushCtx.globalAlpha = 1;
        }

        function drawSparkleStar(x, y, size, color) {
            brushCtx.fillStyle = color;
            brushCtx.beginPath();
            brushCtx.moveTo(x, y - size);
            brushCtx.lineTo(x + size * 0.25, y - size * 0.25);
            brushCtx.lineTo(x + size, y);
            brushCtx.lineTo(x + size * 0.25, y + size * 0.25);
            brushCtx.lineTo(x, y + size);
            brushCtx.lineTo(x - size * 0.25, y + size * 0.25);
            brushCtx.lineTo(x - size, y);
            brushCtx.lineTo(x - size * 0.25, y - size * 0.25);
            brushCtx.closePath();
            brushCtx.fill();
        }

        function drawGlitterSegment(x1, y1, x2, y2) {
            brushCtx.shadowBlur = 0;
            // very faint connecting trail
            brushCtx.globalAlpha = 0.18;
            brushCtx.strokeStyle = settings.lineColor;
            brushCtx.lineCap = 'round';
            brushCtx.lineWidth = settings.lineWidth * 0.35;
            strokeBetween(brushCtx, x1, y1, x2, y2);
            brushCtx.globalAlpha = 1;

            // sparkle particles
            const dx = x2 - x1, dy = y2 - y1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const steps = Math.max(1, Math.floor(dist / 3));
            const accent = '#CFE9F7';
            for (let i = 0; i < steps; i++) {
                const t = i / steps;
                const cx = x1 + dx * t, cy = y1 + dy * t;
                const count = 2 + Math.floor(Math.random() * 2);
                for (let k = 0; k < count; k++) {
                    const a = Math.random() * Math.PI * 2;
                    const r = Math.random() * (settings.lineWidth * 0.8);
                    const px = cx + Math.cos(a) * r;
                    const py = cy + Math.sin(a) * r;
                    const sz = Math.random() * 2.6 + 0.6;
                    const isAccent = Math.random() < 0.4;
                    brushCtx.globalAlpha = Math.random() * 0.5 + 0.5;
                    drawSparkleStar(px, py, sz, isAccent ? '#ffffff' : (Math.random() < 0.5 ? settings.lineColor : accent));
                }
            }
            // occasional bright highlight star directly on the path
            if (Math.random() < 0.45) {
                brushCtx.globalAlpha = 0.95;
                drawSparkleStar((x1 + x2) / 2, (y1 + y2) / 2, settings.lineWidth * 0.18, '#ffffff');
            }
            brushCtx.globalAlpha = 1;
        }

        function drawNeonSegment(x1, y1, x2, y2) {
            brushCtx.lineCap = 'round';
            brushCtx.lineJoin = 'round';
            // wide outer halo
            brushCtx.shadowColor = settings.lineColor;
            brushCtx.shadowBlur = settings.lineWidth * 1.6;
            brushCtx.globalAlpha = 0.55;
            brushCtx.strokeStyle = settings.lineColor;
            brushCtx.lineWidth = settings.lineWidth * 0.85;
            strokeBetween(brushCtx, x1, y1, x2, y2);
            // mid glow
            brushCtx.shadowBlur = settings.lineWidth * 0.8;
            brushCtx.globalAlpha = 1;
            brushCtx.lineWidth = settings.lineWidth * 0.55;
            strokeBetween(brushCtx, x1, y1, x2, y2);
            // bright white core
            brushCtx.shadowBlur = settings.lineWidth * 0.3;
            brushCtx.strokeStyle = '#ffffff';
            brushCtx.lineWidth = Math.max(2, settings.lineWidth * 0.2);
            strokeBetween(brushCtx, x1, y1, x2, y2);
            // reset
            brushCtx.shadowBlur = 0;
            brushCtx.globalAlpha = 1;
        }

        // ===== 눈 브러쉬 (뽀얗고 뽀송한 파우더 스노우) =====
        function hexToRgb(hex) {
            const h = (hex || '#ffffff').replace('#', '');
            return {
                r: parseInt(h.substring(0, 2), 16),
                g: parseInt(h.substring(2, 4), 16),
                b: parseInt(h.substring(4, 6), 16)
            };
        }

        // 부드러운 눈 뭉치 하나 (가장자리가 흐릿하게 페이드)
        function drawSnowPuff(cx, cy, rad, tint, coreAlpha) {
            // 살짝 컬러 입힌 바깥 후광
            const halo = brushCtx.createRadialGradient(cx, cy, 0, cx, cy, rad * 1.5);
            halo.addColorStop(0, `rgba(${tint.r},${tint.g},${tint.b},0.28)`);
            halo.addColorStop(1, `rgba(${tint.r},${tint.g},${tint.b},0)`);
            brushCtx.fillStyle = halo;
            brushCtx.beginPath();
            brushCtx.arc(cx, cy, rad * 1.5, 0, Math.PI * 2);
            brushCtx.fill();
            // 뽀얀 흰색 코어
            const core = brushCtx.createRadialGradient(cx, cy, 0, cx, cy, rad);
            core.addColorStop(0, `rgba(255,255,255,${coreAlpha})`);
            core.addColorStop(0.55, `rgba(255,255,255,${coreAlpha * 0.5})`);
            core.addColorStop(1, 'rgba(255,255,255,0)');
            brushCtx.fillStyle = core;
            brushCtx.beginPath();
            brushCtx.arc(cx, cy, rad, 0, Math.PI * 2);
            brushCtx.fill();
        }

        function drawSnowSegment(x1, y1, x2, y2) {
            brushCtx.shadowBlur = 0;
            brushCtx.save();
            const tint = hexToRgb(settings.lineColor);
            const dx = x2 - x1, dy = y2 - y1;
            const dist = Math.sqrt(dx * dx + dy * dy);
            const spacing = Math.max(3, settings.lineWidth * 0.35);
            const steps = Math.max(1, Math.floor(dist / spacing));
            for (let i = 0; i < steps; i++) {
                const t = i / steps;
                const baseX = x1 + dx * t, baseY = y1 + dy * t;
                const puffs = 2 + Math.floor(Math.random() * 2);
                for (let k = 0; k < puffs; k++) {
                    const a = Math.random() * Math.PI * 2;
                    const r = Math.random() * settings.lineWidth * 0.55;
                    const px = baseX + Math.cos(a) * r;
                    const py = baseY + Math.sin(a) * r;
                    const rad = settings.lineWidth * (0.16 + Math.random() * 0.26);
                    drawSnowPuff(px, py, rad, tint, 0.55 + Math.random() * 0.4);
                }
                // 가끔 반짝이는 작은 흰 점 (눈가루)
                if (Math.random() < 0.25) {
                    brushCtx.fillStyle = 'rgba(255,255,255,0.95)';
                    brushCtx.beginPath();
                    brushCtx.arc(baseX + (Math.random() - 0.5) * settings.lineWidth,
                                 baseY + (Math.random() - 0.5) * settings.lineWidth,
                                 Math.random() * 1.4 + 0.5, 0, Math.PI * 2);
                    brushCtx.fill();
                }
            }
            brushCtx.restore();
            brushCtx.globalAlpha = 1;
        }

        const BRUSH_FNS = {
            basic: drawBasicSegment,
            crayon: drawCrayonSegment,
            glitter: drawGlitterSegment,
            neon: drawNeonSegment,
            snow: drawSnowSegment
        };

        // ===== 부드러운 선 그리기 (Catmull-Rom + 선택 브러쉬) =====
        // Only stroke the newest segment each frame (from the previous
        // smoothed end → current smoothed end), so we don't re-paint old
        // segments and pile up shadow/highlight layers (which made the line
        // look like overlapping dots).
        function drawSmoothLine() {
            const points = pointHistory;
            if (points.length < 2) return;

            const resolution = 10;
            const brushFn = BRUSH_FNS[settings.brushType] || drawBasicSegment;

            // newest segment: between p1 and p2, with p0/p3 as neighbors for
            // Catmull-Rom shape continuity.
            const n = points.length;
            const p0 = points[Math.max(0, n - 3)];
            const p1 = points[n - 2];
            const p2 = points[n - 1];
            const p3 = points[n - 1]; // mirror end

            // Pick up where the previous frame's smoothed curve ended so the
            // stroke is continuous instead of starting fresh at p1 (which can
            // cause a visible "step" each frame).
            let prevX = (lastSmoothX !== null) ? lastSmoothX
                       : catmullRom(p0.x, p1.x, p2.x, p3.x, 0);
            let prevY = (lastSmoothY !== null) ? lastSmoothY
                       : catmullRom(p0.y, p1.y, p2.y, p3.y, 0);

            for (let j = 1; j <= resolution; j++) {
                const t = j / resolution;
                const x = catmullRom(p0.x, p1.x, p2.x, p3.x, t);
                const y = catmullRom(p0.y, p1.y, p2.y, p3.y, t);
                brushFn(prevX, prevY, x, y);
                prevX = x;
                prevY = y;
            }

            lastSmoothX = prevX;
            lastSmoothY = prevY;
        }

        // ===== 프레임 처리 =====
        function processFrame() {
            if (!isRunning) return;

            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
            ctx.restore();

            if (handLandmarker && video.readyState === video.HAVE_ENOUGH_DATA) {
                const results = handLandmarker.detectForVideo(video, performance.now());

                const hands = results.landmarks || [];
                const seen = new Set();
                for (let _h = 0; _h < hands.length; _h++) {
                    const landmarks = hands[_h];
                    currentHandId = _h;
                    seen.add(_h);
                    const _st = getHandState(_h);
                    loadHandGlobals(_st);

                    // 손바닥을 다 펴면: 지우개 (모드 무관, 손바닥 면적만큼 지움)
                    if (isPalmOpen(landmarks)) {
                        if (isDrawing) { resetStroke(); ipCtx.clearRect(0, 0, ipCanvas.width, ipCanvas.height); }
                        if (grabbedObject) grabbedObject = null;
                        erasePalm(landmarks);
                        drawEraserCursor(landmarks);
                        statusEl.textContent = 'Erasing...';
                        statusEl.className = 'status idle';
                        saveHandGlobals(_st);
                        continue;
                    }

                    if (mode === 'draw') {
                        const grab = detectGrabPinch(landmarks);
                        const W = drawingCanvas.width, H = drawingCanvas.height;

                        if (grab.isPinch) {
                            // 꼬집기 시작: 그리던 열린 선이 있으면 먼저 확정
                            if (isDrawing) finalizeOpenStroke();

                            const gx = (1 - grab.x) * W;
                            const gy = grab.y * H;

                            if (!grabbedObject) {
                                const cand = hitTestObject(gx, gy);
                                grabbedObject = (cand && !objectGrabbedByOther(cand, currentHandId)) ? cand : null;
                                if (grabbedObject) {
                                    grabDX = gx - grabbedObject.x;
                                    grabDY = gy - grabbedObject.y;
                                    // 맨 앞으로 가져오기
                                    const gi = drawnObjects.indexOf(grabbedObject);
                                    drawnObjects.splice(gi, 1);
                                    drawnObjects.push(grabbedObject);
                                    statusEl.textContent = 'Grabbed — move it';
                                    statusEl.className = 'status drawing';
                                } else {
                                    statusEl.textContent = 'Nothing to grab here';
                                    statusEl.className = 'status idle';
                                }
                            } else {
                                grabbedObject.x = gx - grabDX;
                                grabbedObject.y = gy - grabDY;
                                statusEl.textContent = 'Moving...';
                                statusEl.className = 'status drawing';
                            }

                            // 커서: 잡았으면 초록, 빈손이면 로즈
                            ctx.fillStyle = grabbedObject ? 'rgba(120, 200, 120, 0.8)' : 'rgba(138, 208, 236, 0.7)';
                            ctx.beginPath();
                            ctx.arc(gx, gy, 16, 0, Math.PI * 2);
                            ctx.fill();
                        } else {
                            // 꼬집기 해제 → 잡고 있던 물체 내려놓기
                            if (grabbedObject) {
                                grabbedObject = null;
                                statusEl.textContent = 'Dropped';
                                statusEl.className = 'status idle';
                            }

                            const open = isHandOpen(landmarks);
                            const fingerTip = landmarks[8];
                            const x = (1 - fingerTip.x) * W;
                            const y = fingerTip.y * H;

                            if (open) {
                                pointHistory.push({x, y});
                                if (pointHistory.length > settings.history) {
                                    pointHistory.shift();
                                }
                                currentStrokePts.push({x, y});

                                if (isDrawing) {
                                    if (pointHistory.length >= 2) {
                                        brushCtx = ipCtx;
                                        drawSmoothLine();
                                    }
                                } else {
                                    isDrawing = true;
                                    lastSmoothX = null;
                                    lastSmoothY = null;
                                }
                                lastX = x; lastY = y;

                                // 시작점으로 돌아오면 물체로 확정
                                checkLoopClosure();

                                if (isDrawing) {
                                    statusEl.textContent = 'Drawing — close the loop to make an object';
                                    statusEl.className = 'status drawing';
                                }
                                downloadBtn.disabled = false;
                            } else {
                                if (isDrawing) {
                                    finalizeOpenStroke();
                                    statusEl.textContent = 'Open your hand to draw';
                                    statusEl.className = 'status idle';
                                }
                            }

                            ctx.fillStyle = 'rgba(100, 200, 255, 0.6)';
                            ctx.beginPath();
                            ctx.arc(x, y, 15, 0, Math.PI * 2);
                            ctx.fill();
                        }

                    } else if (mode === 'sticker') {
                        // 검지 끝으로 팔레트의 스티커를 가리키면 선택 (머물면 선택)
                        const tip = landmarks[8];
                        const clientX = (1 - tip.x) * window.innerWidth;
                        const clientY = tip.y * window.innerHeight;
                        updateStickerHover(clientX, clientY);

                        const pinch = detectPinch(landmarks);

                        if (pinch.isPinch && selectedSticker) {
                            floatingSticker = {
                                x: 1 - pinch.x,
                                y: pinch.y,
                                type: selectedSticker
                            };
                            isPinching = true;
                            statusEl.textContent = 'Placing sticker...';
                        } else {
                            if (isPinching && floatingSticker) {
                                addSticker(floatingSticker.x, floatingSticker.y, floatingSticker.type);
                                statusEl.textContent = 'Placed!';
                            }
                            floatingSticker = null;
                            isPinching = false;
                        }

                        // 검지 끝 포인터 (선택됨: 얼음색 / 아니면 흰색)
                        const fx = (1 - tip.x) * stickerCanvas.width;
                        const fy = tip.y * stickerCanvas.height;
                        ctx.fillStyle = selectedSticker ? 'rgba(138, 208, 236, 0.85)' : 'rgba(255, 255, 255, 0.65)';
                        ctx.beginPath();
                        ctx.arc(fx, fy, 13, 0, Math.PI * 2);
                        ctx.fill();
                    }
                    saveHandGlobals(_st);
                }

                // 화면에서 사라진 손: 진행 중이던 선 확정 + 잡은 물체 내려놓기
                for (const id in handStates) {
                    if (seen.has(Number(id))) continue;
                    const _st2 = handStates[id];
                    if (!_st2.isDrawing && !_st2.grabbedObject) continue;
                    loadHandGlobals(_st2);
                    if (isDrawing) finalizeOpenStroke();
                    if (grabbedObject) grabbedObject = null;
                    saveHandGlobals(_st2);
                }

                if (hands.length === 0) {
                    statusEl.textContent = 'No hand detected';
                    statusEl.className = 'status idle';
                    if (mode === 'sticker') clearStickerHover();
                }
            }

            if (mode === 'sticker') {
                stickerCtx.clearRect(0, 0, stickerCanvas.width, stickerCanvas.height);
                drawAllStickers();
                for (const id in handStates) {
                    const fs = handStates[id].floatingSticker;
                    if (!fs) continue;
                    stickerCtx.globalAlpha = 0.7;
                    drawSticker(fs.x * stickerCanvas.width, fs.y * stickerCanvas.height, fs.type);
                    stickerCtx.globalAlpha = 1.0;
                }
            }

            // 그리기 모드: 물체 레이어 합성 (확정된 물체들 + 진행 중인 선)
            if (mode === 'draw') {
                objectCtx.clearRect(0, 0, objectCanvas.width, objectCanvas.height);
                for (const o of drawnObjects) {
                    objectCtx.drawImage(o.canvas, o.x, o.y);
                }
                objectCtx.drawImage(ipCanvas, 0, 0);
            }

            requestAnimationFrame(processFrame);
        }

        // ===== 핀치 감지 =====
        function detectPinch(landmarks) {
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];

            const distance = Math.sqrt(
                Math.pow(indexTip.x - middleTip.x, 2) +
                Math.pow(indexTip.y - middleTip.y, 2)
            );

            if (distance < settings.pinchSensitivity) {
                const pinchX = (indexTip.x + middleTip.x) / 2;
                const pinchY = (indexTip.y + middleTip.y) / 2;
                return { isPinch: true, x: pinchX, y: pinchY };
            }
            return { isPinch: false };
        }

        // ===== 잡기(꼬집기) 제스처: 엄지(4) + 검지(8) =====
        function detectGrabPinch(landmarks) {
            const thumb = landmarks[4];
            const index = landmarks[8];
            const d = Math.sqrt(
                Math.pow(thumb.x - index.x, 2) +
                Math.pow(thumb.y - index.y, 2)
            );
            if (d < settings.pinchSensitivity) {
                return { isPinch: true, x: (thumb.x + index.x) / 2, y: (thumb.y + index.y) / 2 };
            }
            return { isPinch: false };
        }

        // ===== 물체 히트 테스트 (맨 위 물체부터 검사) =====
        function hitTestObject(px, py) {
            for (let i = drawnObjects.length - 1; i >= 0; i--) {
                const o = drawnObjects[i];
                if (px >= o.x && px <= o.x + o.w && py >= o.y && py <= o.y + o.h) {
                    return o;
                }
            }
            return null;
        }

        // ===== 시작점으로 돌아왔는지(루프 닫힘) 감지 → 물체화 =====
        function checkLoopClosure() {
            if (!isDrawing || currentStrokePts.length < 4) return;
            const start = currentStrokePts[0];
            const cur = currentStrokePts[currentStrokePts.length - 1];
            const d = Math.sqrt(
                Math.pow(cur.x - start.x, 2) +
                Math.pow(cur.y - start.y, 2)
            );
            const threshold = drawingCanvas.width * 0.04;

            // 일단 시작점에서 충분히 멀어져야 닫힘을 허용 (즉시 닫힘 방지)
            if (!strokeLeftStart && d > threshold * 1.8) {
                strokeLeftStart = true;
            }
            if (strokeLeftStart && currentStrokePts.length > 16 && d < threshold) {
                finalizeObject();
            }
        }

        // ===== 진행 중인 선을 '움직일 수 있는 물체'로 확정 =====
        function finalizeObject() {
            // 시작점으로 한 번 더 이어 그려 루프를 닫음
            const start = currentStrokePts[0];
            pointHistory.push({ x: start.x, y: start.y });
            brushCtx = ipCtx;
            drawSmoothLine();

            // 바운딩 박스 계산
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
            for (const p of currentStrokePts) {
                if (p.x < minX) minX = p.x;
                if (p.y < minY) minY = p.y;
                if (p.x > maxX) maxX = p.x;
                if (p.y > maxY) maxY = p.y;
            }
            const pad = settings.lineWidth + 32; // 글로우/그림자 여유
            minX = Math.max(0, Math.floor(minX - pad));
            minY = Math.max(0, Math.floor(minY - pad));
            maxX = Math.min(ipCanvas.width, Math.ceil(maxX + pad));
            maxY = Math.min(ipCanvas.height, Math.ceil(maxY + pad));
            const w = maxX - minX, h = maxY - minY;
            if (w < 6 || h < 6) { ipCtx.clearRect(0,0,ipCanvas.width,ipCanvas.height); resetStroke(); return; }

            // 진행 캔버스에서 해당 영역만 잘라 베이크 (한 번만 렌더 → 이동 시 깜빡임 없음)
            const objCanvas = document.createElement('canvas');
            objCanvas.width = w;
            objCanvas.height = h;
            objCanvas.getContext('2d').drawImage(ipCanvas, minX, minY, w, h, 0, 0, w, h);

            drawnObjects.push({ canvas: objCanvas, x: minX, y: minY, w, h });

            // 진행 캔버스 비우고 상태 초기화
            ipCtx.clearRect(0, 0, ipCanvas.width, ipCanvas.height);
            resetStroke();

            statusEl.textContent = 'Object done — pinch to move it';
            statusEl.className = 'status drawing';
            downloadBtn.disabled = false;
        }

        // ===== 닫히지 않은 열린 선은 영구 레이어로 확정 =====
        function finalizeOpenStroke() {
            drawCtx.drawImage(ipCanvas, 0, 0);
            ipCtx.clearRect(0, 0, ipCanvas.width, ipCanvas.height);
            resetStroke();
        }

        function resetStroke() {
            isDrawing = false;
            pointHistory = [];
            currentStrokePts = [];
            strokeLeftStart = false;
            lastSmoothX = null;
            lastSmoothY = null;
        }

        // ===== 스티커 관리 =====
        function selectSticker(stickerType) {
            selectedSticker = stickerType;
            document.querySelectorAll('.sticker-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            document.querySelector(`[data-sticker="${stickerType}"]`).classList.add('selected');
            statusEl.textContent = 'Selected — pinch to place';
        }

        // 검지 끝으로 스티커 버튼에 머물면 선택 (짧은 머물림 후 확정)
        let hoverSticker = null;
        let hoverSince = 0;
        function updateStickerHover(clientX, clientY) {
            const btns = stickerPalette.querySelectorAll('.sticker-btn');
            let found = null;
            btns.forEach(b => {
                const r = b.getBoundingClientRect();
                if (clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom) found = b;
            });
            btns.forEach(b => { if (b !== found) b.classList.remove('hovering'); });
            if (found) {
                found.classList.add('hovering');
                const name = found.dataset.sticker;
                const now = performance.now();
                if (hoverSticker !== name) { hoverSticker = name; hoverSince = now; }
                else if (now - hoverSince > 450 && selectedSticker !== name) {
                    selectSticker(name);
                }
            } else {
                hoverSticker = null;
            }
        }
        function clearStickerHover() {
            stickerPalette.querySelectorAll('.sticker-btn').forEach(b => b.classList.remove('hovering'));
            hoverSticker = null;
        }

        function addSticker(normX, normY, stickerType) {
            const x = normX * stickerCanvas.width;
            const y = normY * stickerCanvas.height;
            stickers.push({ x, y, type: stickerType });
            drawAllStickers();
        }

        function drawAllStickers() {
            stickerCtx.clearRect(0, 0, stickerCanvas.width, stickerCanvas.height);
            stickers.forEach(sticker => {
                drawSticker(sticker.x, sticker.y, sticker.type);
            });
        }

        function drawSticker(x, y, type) {
            const size = settings.stickerSize;
            stickerCtx.save();
            stickerCtx.translate(x, y);
            stickerCtx.font = `${size}px Arial`;
            stickerCtx.textAlign = 'center';
            stickerCtx.textBaseline = 'middle';

            const sticker = settings.stickers.find(s => s.name === type);
            if (sticker) {
                stickerCtx.fillText(sticker.emoji, 0, 0);
            }

            stickerCtx.restore();
        }

        // ===== 모드 전환 =====
        function switchMode(newMode) {
            // 모드 전환 시 진행 중이던 선은 영구 레이어로 확정
            if (ipCanvas.width) {
                drawCtx.drawImage(ipCanvas, 0, 0);
                ipCtx.clearRect(0, 0, ipCanvas.width, ipCanvas.height);
            }
            // 모든 손 상태 초기화
            for (const id in handStates) delete handStates[id];
            mode = newMode;
            isDrawing = false;
            pointHistory = [];
            currentStrokePts = [];
            strokeLeftStart = false;
            grabbedObject = null;
            lastSmoothX = null;
            lastSmoothY = null;
            floatingSticker = null;
            isPinching = false;
            selectedSticker = null;

            document.querySelectorAll('.mode-tab').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelector(`[data-mode="${newMode}"]`).classList.add('active');

            const drawingSettings = document.getElementById('drawingSettings');
            const stickerSettings = document.getElementById('stickerSettings');

            if (newMode === 'sticker') {
                stickerPalette.classList.add('show');
                drawingSettings.style.display = 'none';
                stickerSettings.style.display = 'block';
                document.querySelector('.hud-left').style.display = 'none';
                statusEl.textContent = 'Sticker mode — point to pick, pinch to place';
            } else {
                stickerPalette.classList.remove('show');
                drawingSettings.style.display = 'block';
                stickerSettings.style.display = 'none';
                document.querySelector('.hud-left').style.display = '';
                statusEl.textContent = 'Draw mode — open your hand to draw';
            }
        }

        // ===== 기타 함수 =====
        function clearCanvas() {
            drawCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
            stickerCtx.clearRect(0, 0, stickerCanvas.width, stickerCanvas.height);
            if (objectCanvas.width) objectCtx.clearRect(0, 0, objectCanvas.width, objectCanvas.height);
            if (ipCanvas.width) ipCtx.clearRect(0, 0, ipCanvas.width, ipCanvas.height);
            pointHistory = [];
            currentStrokePts = [];
            strokeLeftStart = false;
            drawnObjects = [];
            grabbedObject = null;
            lastSmoothX = null;
            lastSmoothY = null;
            stickers = [];
            floatingSticker = null;
            isDrawing = false;
            isPinching = false;
            for (const id in handStates) delete handStates[id];
            downloadBtn.disabled = true;
            statusEl.textContent = 'Cleared';
        }

        function downloadDrawing() {
            // 카메라 + 그림 + 물체 + 스티커를 모두 합성한 한 장으로 저장
            const out = document.createElement('canvas');
            out.width = canvas.width;
            out.height = canvas.height;
            const octx = out.getContext('2d');
            octx.drawImage(canvas, 0, 0);        // 현재 카메라 프레임(미러링됨)
            octx.drawImage(drawingCanvas, 0, 0); // 영구 드로잉
            octx.drawImage(objectCanvas, 0, 0);  // 움직이는 물체
            octx.drawImage(stickerCanvas, 0, 0); // 스티커
            const link = document.createElement('a');
            link.href = out.toDataURL('image/png');
            link.download = `photobooth_${Date.now()}.png`;
            link.click();
        }

        function stopCamera() {
            isRunning = false;
            video.srcObject.getTracks().forEach(track => track.stop());
            startBtn.textContent = 'Start';
            clearBtn.disabled = true;
            statusEl.textContent = 'Stopped';
            statusEl.className = 'status idle';
        }

        // ===== 이벤트 리스너 =====
        startBtn.addEventListener('click', () => { isRunning ? stopCamera() : startCamera(); });
        clearBtn.addEventListener('click', clearCanvas);
        downloadBtn.addEventListener('click', downloadDrawing);

        document.querySelectorAll('.mode-tab').forEach(btn => {
            btn.addEventListener('click', (e) => {
                switchMode(e.target.dataset.mode);
            });
        });

        // ===== 초기화 =====
        window.addEventListener('load', () => {
            loadSettings();
            initMediaPipe();
        });
    </script>
</body>
</html>
