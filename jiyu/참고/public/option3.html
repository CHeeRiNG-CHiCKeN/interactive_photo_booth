<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Photobooth - Option 3 (Character Avatar)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 30px;
            max-width: 800px;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 4 / 3;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        #canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .loading {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.2em;
            z-index: 10;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .info-panel {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .info-panel h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .info-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 1.1em;
            color: #333;
            font-weight: bold;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #e0e0e0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #d0d0d0;
        }

        .legend {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
        }

        .legend h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .legend-items {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            font-size: 0.9em;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .legend-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
        }

        .green-line {
            background: linear-gradient(90deg, #00ff00, #00ff00);
            width: 20px;
            height: 3px;
            border-radius: 2px;
        }

        .red-dot {
            background: #ff0000;
        }

        .orange-dot {
            background: #ffa500;
        }

        .yellow-dot {
            background: #ffff00;
        }

        .cyan-dot {
            background: #00ffff;
        }

        video {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎭 포토부스 (캐릭터)</h1>
            <p>당신의 포즈를 귀여운 캐릭터로 변환합니다!</p>
        </div>

        <div class="error" id="error"></div>

        <div class="video-wrapper">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <svg id="skeleton" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;"></svg>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>🤖 AI 모델 로딩 중...</p>
            </div>
        </div>

        <div class="controls">
            <button class="btn-primary" id="startBtn">카메라 시작</button>
            <button class="btn-secondary" id="stopBtn">카메라 중지</button>
        </div>

        <div class="info-panel">
            <h2>📊 상태 정보</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label">카메라</div>
                    <div class="info-value" id="cameraStatus">❌ 준비 중</div>
                </div>
                <div class="info-item">
                    <div class="info-label">포즈 모델</div>
                    <div class="info-value" id="poseStatus">📥 로딩 중</div>
                </div>
                <div class="info-item">
                    <div class="info-label">손 모델</div>
                    <div class="info-value" id="handStatus">📥 로딩 중</div>
                </div>
                <div class="info-item">
                    <div class="info-label">포즈 감지</div>
                    <div class="info-value" id="poseDetect">⏳ 대기</div>
                </div>
                <div class="info-item">
                    <div class="info-label">손 감지</div>
                    <div class="info-value" id="handDetect">⏳ 대기</div>
                </div>
                <div class="info-item">
                    <div class="info-label">FPS</div>
                    <div class="info-value" id="fps">-- fps</div>
                </div>
            </div>
        </div>

        <div class="legend">
            <h3>🎯 범례</h3>
            <div class="legend-items">
                <div class="legend-item">
                    <div class="green-line"></div>
                    <span>포즈 뼈대</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color red-dot"></div>
                    <span>높은 신뢰도</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color orange-dot"></div>
                    <span>중간 신뢰도</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color yellow-dot"></div>
                    <span>낮은 신뢰도</span>
                </div>
                <div class="legend-item">
                    <div class="legend-color cyan-dot"></div>
                    <span>손 랜드마크</span>
                </div>
            </div>
        </div>
    </div>

    <!-- TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.11.0"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection@2.1.0"></script>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0"></script>

    <script>
        // 전역 상태
        const state = {
            isRunning: false,
            detector: null,
            handDetector: null,
            poses: null,
            hands: null,
            lastFrameTime: Date.now(),
            frameCount: 0,
            fps: 0,
            // 딜레이 효과를 위한 포즈 히스토리
            poseHistory: [],
            handHistory: [],
            delayFrames: 15  // 15프레임 딜레이 (약 250ms at 60fps)
        };

        const elements = {
            video: document.getElementById('video'),
            canvas: document.getElementById('canvas'),
            loading: document.getElementById('loading'),
            error: document.getElementById('error'),
            startBtn: document.getElementById('startBtn'),
            stopBtn: document.getElementById('stopBtn'),
            cameraStatus: document.getElementById('cameraStatus'),
            poseStatus: document.getElementById('poseStatus'),
            handStatus: document.getElementById('handStatus'),
            poseDetect: document.getElementById('poseDetect'),
            handDetect: document.getElementById('handDetect'),
            fps: document.getElementById('fps')
        };

        // 에러 표시
        function showError(message) {
            elements.error.textContent = '⚠️ ' + message;
            elements.error.classList.add('show');
            console.error(message);
        }

        function hideError() {
            elements.error.classList.remove('show');
        }

        // 모델 초기화
        async function initModels() {
            try {
                // TensorFlow.js 준비
                await tf.setBackend('webgl');
                await tf.ready();

                // MoveNet 포즈 감지
                const poseDetector = await poseDetection.createDetector(
                    poseDetection.SupportedModels.MoveNet,
                    { modelType: poseDetection.movenet.modelType.SINGLEPOSE_LIGHTNING }
                );
                state.detector = poseDetector;
                elements.poseStatus.textContent = '✅ 준비 완료';

                // MediaPipe 손 감지 초기화
                const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0');
                const FilesetResolver = vision.FilesetResolver;
                const HandLandmarker = vision.HandLandmarker;

                const handDetector = await HandLandmarker.createFromOptions(
                    await FilesetResolver.forVisionTasks(
                        'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm'
                    ),
                    {
                        baseOptions: {
                            modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task'
                        },
                        runningMode: 'VIDEO',
                        numHands: 2  // 👈 양손 감지 설정 추가
                    }
                );
                state.handDetector = handDetector;
                elements.handStatus.textContent = '✅ 준비 완료';

                hideError();
                elements.loading.style.display = 'none';
                return true;
            } catch (error) {
                showError('모델 로드 실패: ' + error.message);
                elements.loading.style.display = 'none';
                return false;
            }
        }

        // 카메라 시작
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
                    audio: false
                });
                elements.video.srcObject = stream;
                elements.cameraStatus.textContent = '✅ 연결됨';
                state.isRunning = true;
                elements.startBtn.disabled = true;
                elements.stopBtn.disabled = false;

                // 비디오 재생 대기
                await new Promise(resolve => {
                    elements.video.onloadedmetadata = () => {
                        elements.video.play();
                        resolve();
                    };
                });

                // Canvas 크기 설정
                elements.canvas.width = elements.video.videoWidth;
                elements.canvas.height = elements.video.videoHeight;

                detectFrame();
            } catch (error) {
                showError('카메라 접근 실패: ' + error.message);
                elements.cameraStatus.textContent = '❌ 실패';
            }
        }

        // 카메라 중지
        function stopCamera() {
            state.isRunning = false;
            if (elements.video.srcObject) {
                elements.video.srcObject.getTracks().forEach(track => track.stop());
            }
            elements.cameraStatus.textContent = '❌ 중지됨';
            elements.poseDetect.textContent = '⏳ 대기';
            elements.handDetect.textContent = '⏳ 대기';
            elements.startBtn.disabled = false;
            elements.stopBtn.disabled = true;
        }

        // 프레임 감지
        async function detectFrame() {
            if (!state.isRunning || !elements.video.videoWidth) {
                requestAnimationFrame(detectFrame);
                return;
            }

            try {
                // 포즈 감지
                if (state.detector && elements.video.readyState === HTMLMediaElement.HAVE_ENOUGH_DATA) {
                    const poses = await state.detector.estimatePoses(elements.video, { flipHorizontal: true });
                    state.poses = poses.length > 0 ? poses[0] : null;
                    elements.poseDetect.textContent = state.poses ? '✅ 감지 중' : '⏳ 대기';
                }

                // 손 감지
                if (state.handDetector) {
                    const detectionResult = state.handDetector.detectForVideo(elements.video, performance.now());
                    state.hands = detectionResult.landmarks && detectionResult.landmarks.length > 0 ? detectionResult.landmarks : null;
                    elements.handDetect.textContent = state.hands && state.hands.length > 0 ? `✅ ${state.hands.length}손` : '⏳ 대기';
                }

                // 히스토리에 현재 포즈/손 저장
                state.poseHistory.push(state.poses);
                state.handHistory.push(state.hands);

                // 히스토리 크기 유지 (메모리 절약)
                if (state.poseHistory.length > state.delayFrames + 5) {
                    state.poseHistory.shift();
                    state.handHistory.shift();
                }

                // 그리기 (딜레이된 데이터 사용)
                drawFrame();

                // FPS 계산
                state.frameCount++;
                const now = Date.now();
                if (now - state.lastFrameTime >= 1000) {
                    state.fps = state.frameCount;
                    elements.fps.textContent = state.fps + ' fps';
                    state.frameCount = 0;
                    state.lastFrameTime = now;
                }
            } catch (error) {
                console.error('Detection error:', error);
            }

            requestAnimationFrame(detectFrame);
        }

        // 프레임 그리기
        function drawFrame() {
            const ctx = elements.canvas.getContext('2d');

            // 비디오 그리기 (좌우 반전)
            ctx.save();
            ctx.scale(-1, 1);
            ctx.drawImage(elements.video, -elements.canvas.width, 0, elements.canvas.width, elements.canvas.height);
            ctx.restore();

            // 히스토리에서 딜레이된 포즈/손 데이터 가져오기
            let delayedPoses = null;
            let delayedHands = null;

            if (state.poseHistory.length >= state.delayFrames) {
                const poseIndex = state.poseHistory.length - state.delayFrames;
                delayedPoses = state.poseHistory[poseIndex];
            }

            if (state.handHistory.length >= state.delayFrames) {
                const handIndex = state.handHistory.length - state.delayFrames;
                delayedHands = state.handHistory[handIndex];
            }

            // 포즈 그리기 (딜레이된 데이터 사용)
            if (delayedPoses && delayedPoses.keypoints) {
                drawPose(ctx, delayedPoses.keypoints);
            }

            // 손 그리기 (딜레이된 데이터 사용, 양손 지원)
            if (delayedHands && delayedHands.length > 0) {
                delayedHands.forEach((hand, idx) => drawHand(ctx, hand, idx));
            }
        }

        // SVG 사람 애니메이션 (뼈대 + 신체)
        function drawPose(ctx, keypoints) {
            const MIN_CONFIDENCE = 0.3;
            const svgElement = document.getElementById('skeleton');

            // SVG 초기화
            svgElement.innerHTML = '';
            svgElement.setAttribute('viewBox', `0 0 ${elements.canvas.width} ${elements.canvas.height}`);

            const isVisible = (kp) => kp && kp.score > MIN_CONFIDENCE;

            // === 1. 얼굴/머리 그리기 (캐릭터 스타일) ===
            const nose = keypoints[0];
            const leftEye = keypoints[1];
            const rightEye = keypoints[2];
            const leftEar = keypoints[3];
            const rightEar = keypoints[4];

            if (isVisible(nose) && isVisible(leftEye) && isVisible(rightEye)) {
                // 눈 사이 거리로 머리 크기 계산
                const eyeDistance = Math.sqrt(
                    Math.pow(rightEye.x - leftEye.x, 2) +
                    Math.pow(rightEye.y - leftEye.y, 2)
                );
                const headRadius = eyeDistance * 1.5;

                // 머리 중심
                const headCenterX = (leftEye.x + rightEye.x) / 2;
                const headCenterY = (leftEye.y + rightEye.y + nose.y) / 3;

                // 🎨 머리 그래디언트 (더 따뜻한 피부색)
                const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                const gradient = document.createElementNS('http://www.w3.org/2000/svg', 'radialGradient');
                gradient.setAttribute('id', 'headGradient');
                gradient.setAttribute('cx', '35%');
                gradient.setAttribute('cy', '35%');

                const stop1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stop1.setAttribute('offset', '0%');
                stop1.setAttribute('stop-color', 'rgba(255, 230, 200, 1)');

                const stop2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
                stop2.setAttribute('offset', '100%');
                stop2.setAttribute('stop-color', 'rgba(220, 170, 130, 1)');

                gradient.appendChild(stop1);
                gradient.appendChild(stop2);
                defs.appendChild(gradient);
                svgElement.appendChild(defs);

                // 머리 원형
                const head = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                head.setAttribute('cx', headCenterX);
                head.setAttribute('cy', headCenterY);
                head.setAttribute('r', headRadius);
                head.setAttribute('fill', 'url(#headGradient)');
                head.setAttribute('stroke', 'rgba(180, 130, 90, 0.5)');
                head.setAttribute('stroke-width', '2');
                svgElement.appendChild(head);

                // 👂 귀 그리기
                if (isVisible(leftEar)) {
                    const leftEarCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    leftEarCircle.setAttribute('cx', leftEar.x);
                    leftEarCircle.setAttribute('cy', leftEar.y);
                    leftEarCircle.setAttribute('r', headRadius * 0.3);
                    leftEarCircle.setAttribute('fill', 'rgba(220, 170, 130, 0.8)');
                    svgElement.appendChild(leftEarCircle);
                }
                if (isVisible(rightEar)) {
                    const rightEarCircle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    rightEarCircle.setAttribute('cx', rightEar.x);
                    rightEarCircle.setAttribute('cy', rightEar.y);
                    rightEarCircle.setAttribute('r', headRadius * 0.3);
                    rightEarCircle.setAttribute('fill', 'rgba(220, 170, 130, 0.8)');
                    svgElement.appendChild(rightEarCircle);
                }

                // 👀 눈 그리기 (큰 표정있는 눈)
                const eyeRadius = eyeDistance * 0.3;

                // 왼쪽 눈 배경 (흰색)
                const leftEyeWhite = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                leftEyeWhite.setAttribute('cx', leftEye.x);
                leftEyeWhite.setAttribute('cy', leftEye.y);
                leftEyeWhite.setAttribute('r', eyeRadius);
                leftEyeWhite.setAttribute('fill', 'rgba(255, 255, 255, 1)');
                leftEyeWhite.setAttribute('stroke', 'rgba(100, 100, 100, 0.6)');
                leftEyeWhite.setAttribute('stroke-width', '2');
                svgElement.appendChild(leftEyeWhite);

                // 왼쪽 동공 (검은색)
                const leftPupil = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                leftPupil.setAttribute('cx', leftEye.x - eyeRadius * 0.2);
                leftPupil.setAttribute('cy', leftEye.y - eyeRadius * 0.2);
                leftPupil.setAttribute('r', eyeRadius * 0.6);
                leftPupil.setAttribute('fill', 'rgba(0, 0, 0, 0.9)');
                svgElement.appendChild(leftPupil);

                // 왼쪽 눈 하이라이트 (반짝임)
                const leftHighlight = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                leftHighlight.setAttribute('cx', leftEye.x - eyeRadius * 0.4);
                leftHighlight.setAttribute('cy', leftEye.y - eyeRadius * 0.5);
                leftHighlight.setAttribute('r', eyeRadius * 0.25);
                leftHighlight.setAttribute('fill', 'rgba(255, 255, 255, 0.8)');
                svgElement.appendChild(leftHighlight);

                // 오른쪽 눈 배경
                const rightEyeWhite = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                rightEyeWhite.setAttribute('cx', rightEye.x);
                rightEyeWhite.setAttribute('cy', rightEye.y);
                rightEyeWhite.setAttribute('r', eyeRadius);
                rightEyeWhite.setAttribute('fill', 'rgba(255, 255, 255, 1)');
                rightEyeWhite.setAttribute('stroke', 'rgba(100, 100, 100, 0.6)');
                rightEyeWhite.setAttribute('stroke-width', '2');
                svgElement.appendChild(rightEyeWhite);

                // 오른쪽 동공
                const rightPupil = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                rightPupil.setAttribute('cx', rightEye.x + eyeRadius * 0.2);
                rightPupil.setAttribute('cy', rightEye.y - eyeRadius * 0.2);
                rightPupil.setAttribute('r', eyeRadius * 0.6);
                rightPupil.setAttribute('fill', 'rgba(0, 0, 0, 0.9)');
                svgElement.appendChild(rightPupil);

                // 오른쪽 눈 하이라이트
                const rightHighlight = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                rightHighlight.setAttribute('cx', rightEye.x + eyeRadius * 0.4);
                rightHighlight.setAttribute('cy', rightEye.y - eyeRadius * 0.5);
                rightHighlight.setAttribute('r', eyeRadius * 0.25);
                rightHighlight.setAttribute('fill', 'rgba(255, 255, 255, 0.8)');
                svgElement.appendChild(rightHighlight);

                // 👃 코 그리기 (간단한 V자 모양)
                const noseLines = [
                    `M ${nose.x} ${nose.y - eyeDistance * 0.1} L ${nose.x - eyeDistance * 0.05} ${nose.y + eyeDistance * 0.05}`,
                    `M ${nose.x} ${nose.y - eyeDistance * 0.1} L ${nose.x + eyeDistance * 0.05} ${nose.y + eyeDistance * 0.05}`
                ];
                noseLines.forEach(d => {
                    const noseLine = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    noseLine.setAttribute('d', d);
                    noseLine.setAttribute('stroke', 'rgba(150, 100, 80, 0.6)');
                    noseLine.setAttribute('stroke-width', '2');
                    noseLine.setAttribute('stroke-linecap', 'round');
                    noseLine.setAttribute('fill', 'none');
                    svgElement.appendChild(noseLine);
                });

                // 👄 입 그리기 (표정있는 미소)
                const mouthPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const mouthWidth = eyeDistance * 0.6;
                const mouthY = nose.y + eyeDistance * 0.25;
                mouthPath.setAttribute('d', `M ${nose.x - mouthWidth/2} ${mouthY} Q ${nose.x} ${mouthY + eyeDistance * 0.15} ${nose.x + mouthWidth/2} ${mouthY}`);
                mouthPath.setAttribute('stroke', 'rgba(200, 80, 80, 0.8)');
                mouthPath.setAttribute('stroke-width', '2.5');
                mouthPath.setAttribute('fill', 'none');
                mouthPath.setAttribute('stroke-linecap', 'round');
                svgElement.appendChild(mouthPath);

                // 입 안쪽 채우기 (살짝)
                const mouthFill = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                mouthFill.setAttribute('d', `M ${nose.x - mouthWidth/2} ${mouthY} Q ${nose.x} ${mouthY + eyeDistance * 0.1} ${nose.x + mouthWidth/2} ${mouthY}`);
                mouthFill.setAttribute('fill', 'rgba(255, 150, 150, 0.3)');
                svgElement.appendChild(mouthFill);

                // 목 그리기
                if (isVisible(keypoints[5]) && isVisible(keypoints[6])) {
                    const shoulderMidX = (keypoints[5].x + keypoints[6].x) / 2;
                    const shoulderMidY = (keypoints[5].y + keypoints[6].y) / 2;
                    const neckWidth = eyeDistance * 0.4;

                    const neckPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    neckPath.setAttribute('d', `M ${headCenterX - neckWidth/2} ${headCenterY + headRadius * 0.7} L ${shoulderMidX - neckWidth/3} ${shoulderMidY} L ${shoulderMidX + neckWidth/3} ${shoulderMidY} L ${headCenterX + neckWidth/2} ${headCenterY + headRadius * 0.7} Z`);
                    neckPath.setAttribute('fill', 'rgba(255, 220, 190, 0.9)');
                    neckPath.setAttribute('stroke', 'rgba(220, 170, 140, 0.5)');
                    neckPath.setAttribute('stroke-width', '1');
                    svgElement.appendChild(neckPath);
                }
            }

            // 👕 몸통 (캐릭터 스타일)
            if (isVisible(keypoints[5]) && isVisible(keypoints[6]) &&
                isVisible(keypoints[11]) && isVisible(keypoints[12])) {

                const shoulderMidX = (keypoints[5].x + keypoints[6].x) / 2;
                const shoulderMidY = (keypoints[5].y + keypoints[6].y) / 2;
                const hipMidX = (keypoints[11].x + keypoints[12].x) / 2;
                const hipMidY = (keypoints[11].y + keypoints[12].y) / 2;

                const torsoWidth = Math.abs(keypoints[6].x - keypoints[5].x);
                const torsoHeight = Math.abs(hipMidY - shoulderMidY);

                // 상반신 (둥근 모양의 옷)
                const torsoPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                torsoPath.setAttribute('d', `
                    M ${shoulderMidX - torsoWidth * 0.35} ${shoulderMidY}
                    L ${shoulderMidX - torsoWidth * 0.25} ${shoulderMidY + torsoHeight * 0.3}
                    Q ${shoulderMidX - torsoWidth * 0.3} ${shoulderMidY + torsoHeight * 0.5} ${shoulderMidX - torsoWidth * 0.2} ${shoulderMidY + torsoHeight * 0.7}
                    L ${hipMidX - torsoWidth * 0.2} ${hipMidY}
                    L ${hipMidX + torsoWidth * 0.2} ${hipMidY}
                    L ${shoulderMidX + torsoWidth * 0.2} ${shoulderMidY + torsoHeight * 0.7}
                    Q ${shoulderMidX + torsoWidth * 0.3} ${shoulderMidY + torsoHeight * 0.5} ${shoulderMidX + torsoWidth * 0.25} ${shoulderMidY + torsoHeight * 0.3}
                    L ${shoulderMidX + torsoWidth * 0.35} ${shoulderMidY}
                    Z
                `);
                torsoPath.setAttribute('fill', 'rgba(100, 150, 220, 0.85)');
                torsoPath.setAttribute('stroke', 'rgba(70, 110, 180, 0.7)');
                torsoPath.setAttribute('stroke-width', '2');
                svgElement.appendChild(torsoPath);

                // 상반신 하이라이트
                const torsoHighlight = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                torsoHighlight.setAttribute('cx', shoulderMidX - torsoWidth * 0.15);
                torsoHighlight.setAttribute('cy', shoulderMidY + torsoHeight * 0.25);
                torsoHighlight.setAttribute('rx', torsoWidth * 0.15);
                torsoHighlight.setAttribute('ry', torsoHeight * 0.2);
                torsoHighlight.setAttribute('fill', 'rgba(150, 180, 255, 0.4)');
                svgElement.appendChild(torsoHighlight);

                // 하반신 (바지 - 둥근 모양)
                const pantsPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                pantsPath.setAttribute('d', `
                    M ${hipMidX - torsoWidth * 0.2} ${hipMidY}
                    Q ${hipMidX - torsoWidth * 0.2} ${hipMidY + torsoHeight * 0.3} ${hipMidX - torsoWidth * 0.15} ${hipMidY + torsoHeight * 0.7}
                    L ${hipMidX - torsoWidth * 0.15} ${hipMidY + torsoHeight}
                    L ${hipMidX + torsoWidth * 0.15} ${hipMidY + torsoHeight}
                    L ${hipMidX + torsoWidth * 0.15} ${hipMidY + torsoHeight * 0.7}
                    Q ${hipMidX + torsoWidth * 0.2} ${hipMidY + torsoHeight * 0.3} ${hipMidX + torsoWidth * 0.2} ${hipMidY}
                    Z
                `);
                pantsPath.setAttribute('fill', 'rgba(60, 60, 80, 0.85)');
                pantsPath.setAttribute('stroke', 'rgba(40, 40, 60, 0.7)');
                pantsPath.setAttribute('stroke-width', '2');
                svgElement.appendChild(pantsPath);

                // 바지 하이라이트
                const pantsHighlight = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                pantsHighlight.setAttribute('cx', hipMidX - torsoWidth * 0.1);
                pantsHighlight.setAttribute('cy', hipMidY + torsoHeight * 0.4);
                pantsHighlight.setAttribute('rx', torsoWidth * 0.08);
                pantsHighlight.setAttribute('ry', torsoHeight * 0.15);
                pantsHighlight.setAttribute('fill', 'rgba(100, 100, 120, 0.3)');
                svgElement.appendChild(pantsHighlight);
            }

            // 팔 (피부색 선)
            if (isVisible(keypoints[5]) && isVisible(keypoints[7]) && isVisible(keypoints[9])) {
                drawSvgArm(svgElement, keypoints[5], keypoints[7], keypoints[9]);
            }
            if (isVisible(keypoints[6]) && isVisible(keypoints[8]) && isVisible(keypoints[10])) {
                drawSvgArm(svgElement, keypoints[6], keypoints[8], keypoints[10]);
            }

            // 다리 (바지색 선)
            if (isVisible(keypoints[11]) && isVisible(keypoints[13]) && isVisible(keypoints[15])) {
                drawSvgLeg(svgElement, keypoints[11], keypoints[13], keypoints[15]);
            }
            if (isVisible(keypoints[12]) && isVisible(keypoints[14]) && isVisible(keypoints[16])) {
                drawSvgLeg(svgElement, keypoints[12], keypoints[14], keypoints[16]);
            }

            // === 2. 뼈대 선 그리기 ===
            const connections = [
                // 얼굴
                [0, 1], [0, 2], [1, 3], [2, 4],
                // 어깨
                [5, 6],
                // 팔
                [5, 7], [7, 9], [6, 8], [8, 10],
                // 몸통
                [5, 11], [6, 12], [11, 12],
                // 다리
                [11, 13], [13, 15], [12, 14], [14, 16]
            ];

            connections.forEach(([from, to]) => {
                const fromKp = keypoints[from];
                const toKp = keypoints[to];

                if (isVisible(fromKp) && isVisible(toKp)) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', fromKp.x);
                    line.setAttribute('y1', fromKp.y);
                    line.setAttribute('x2', toKp.x);
                    line.setAttribute('y2', toKp.y);
                    line.setAttribute('stroke', 'rgba(0, 255, 0, 0.5)');
                    line.setAttribute('stroke-width', '2');
                    line.setAttribute('stroke-linecap', 'round');
                    svgElement.appendChild(line);
                }
            });

            // 얼굴 ↔ 어깨 직선
            const isNoseVisible = isVisible(keypoints[0]);
            const isLeftShoulderVisible = isVisible(keypoints[5]);
            const isRightShoulderVisible = isVisible(keypoints[6]);

            if (isNoseVisible && isLeftShoulderVisible && isRightShoulderVisible) {
                const shoulderMidX = (keypoints[5].x + keypoints[6].x) / 2;
                const shoulderMidY = (keypoints[5].y + keypoints[6].y) / 2;

                const neckLine = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                neckLine.setAttribute('x1', keypoints[0].x);
                neckLine.setAttribute('y1', keypoints[0].y);
                neckLine.setAttribute('x2', shoulderMidX);
                neckLine.setAttribute('y2', shoulderMidY);
                neckLine.setAttribute('stroke', 'rgba(0, 255, 0, 0.5)');
                neckLine.setAttribute('stroke-width', '2');
                neckLine.setAttribute('stroke-linecap', 'round');
                svgElement.appendChild(neckLine);
            }

            // === 3. 관절점 그리기 ===
            keypoints.forEach((kp, idx) => {
                if (isVisible(kp)) {
                    let color;
                    if (kp.score > 0.7) {
                        color = 'rgba(255, 0, 0, 0.6)';
                    } else if (kp.score > 0.5) {
                        color = 'rgba(255, 165, 0, 0.5)';
                    } else {
                        color = 'rgba(255, 255, 0, 0.4)';
                    }

                    const isFace = idx < 5;
                    const radius = isFace ? 4 : 6;

                    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                    circle.setAttribute('cx', kp.x);
                    circle.setAttribute('cy', kp.y);
                    circle.setAttribute('r', radius);
                    circle.setAttribute('fill', color);
                    svgElement.appendChild(circle);
                }
            });
        }

        // SVG 팔 그리기
        function drawSvgArm(svgElement, shoulder, elbow, wrist) {
            // 상완
            const upperArm = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            upperArm.setAttribute('x1', shoulder.x);
            upperArm.setAttribute('y1', shoulder.y);
            upperArm.setAttribute('x2', elbow.x);
            upperArm.setAttribute('y2', elbow.y);
            upperArm.setAttribute('stroke', 'rgba(255, 200, 170, 0.8)');
            upperArm.setAttribute('stroke-width', '12');
            upperArm.setAttribute('stroke-linecap', 'round');
            svgElement.appendChild(upperArm);

            // 하완
            const forearm = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            forearm.setAttribute('x1', elbow.x);
            forearm.setAttribute('y1', elbow.y);
            forearm.setAttribute('x2', wrist.x);
            forearm.setAttribute('y2', wrist.y);
            forearm.setAttribute('stroke', 'rgba(255, 190, 160, 0.8)');
            forearm.setAttribute('stroke-width', '10');
            forearm.setAttribute('stroke-linecap', 'round');
            svgElement.appendChild(forearm);

            // 손
            const hand = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            hand.setAttribute('cx', wrist.x);
            hand.setAttribute('cy', wrist.y);
            hand.setAttribute('r', '10');
            hand.setAttribute('fill', 'rgba(255, 200, 170, 0.9)');
            svgElement.appendChild(hand);
        }

        // SVG 다리 그리기
        function drawSvgLeg(svgElement, hip, knee, ankle) {
            // 넓적다리
            const thigh = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            thigh.setAttribute('x1', hip.x);
            thigh.setAttribute('y1', hip.y);
            thigh.setAttribute('x2', knee.x);
            thigh.setAttribute('y2', knee.y);
            thigh.setAttribute('stroke', 'rgba(60, 60, 80, 0.8)');
            thigh.setAttribute('stroke-width', '14');
            thigh.setAttribute('stroke-linecap', 'round');
            svgElement.appendChild(thigh);

            // 종아리
            const calf = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            calf.setAttribute('x1', knee.x);
            calf.setAttribute('y1', knee.y);
            calf.setAttribute('x2', ankle.x);
            calf.setAttribute('y2', ankle.y);
            calf.setAttribute('stroke', 'rgba(50, 50, 70, 0.8)');
            calf.setAttribute('stroke-width', '12');
            calf.setAttribute('stroke-linecap', 'round');
            svgElement.appendChild(calf);

            // 발
            const foot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            foot.setAttribute('cx', ankle.x);
            foot.setAttribute('cy', ankle.y);
            foot.setAttribute('r', '10');
            foot.setAttribute('fill', 'rgba(80, 60, 40, 0.9)');
            svgElement.appendChild(foot);
        }

        // SVG 손 그리기 (캐릭터 스타일 - 귀여운 손)
        function drawHand(ctx, hand, handIndex) {
            const svgElement = document.getElementById('skeleton');
            const canvasWidth = elements.canvas.width;
            const canvasHeight = elements.canvas.height;

            const connections = [
                [0, 1], [1, 2], [2, 3], [3, 4],
                [0, 5], [5, 6], [6, 7], [7, 8],
                [5, 9], [9, 10], [10, 11], [11, 12],
                [9, 13], [13, 14], [14, 15], [15, 16],
                [13, 17], [17, 18], [18, 19], [19, 20]
            ];

            let validLandmarks = 0;
            const landmarks = [];

            // 유효한 랜드마크 수집
            hand.forEach((lm, idx) => {
                if (lm && lm.x !== undefined && lm.y !== undefined) {
                    const x = lm.x * canvasWidth;
                    const y = lm.y * canvasHeight;
                    landmarks[idx] = { x, y, original: lm };
                    validLandmarks++;
                }
            });

            if (validLandmarks < 10) return;

            // 손의 평균 크기 계산
            const palmSize = landmarks[0] && landmarks[9] ?
                Math.sqrt(Math.pow(landmarks[9].x - landmarks[0].x, 2) +
                         Math.pow(landmarks[9].y - landmarks[0].y, 2)) * 0.15 : 15;

            // === 1. 손바닥 그리기 (둥근 모양) ===
            if (landmarks[0] && landmarks[5] && landmarks[9] && landmarks[13] && landmarks[17]) {
                const palm = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                const palmCenterX = (landmarks[5].x + landmarks[9].x + landmarks[13].x + landmarks[17].x) / 4;
                const palmCenterY = (landmarks[0].y + landmarks[9].y) / 2;

                palm.setAttribute('cx', palmCenterX);
                palm.setAttribute('cy', palmCenterY);
                palm.setAttribute('rx', palmSize * 1.3);
                palm.setAttribute('ry', palmSize * 1.5);
                palm.setAttribute('fill', 'rgba(255, 200, 160, 0.9)');
                palm.setAttribute('stroke', 'rgba(220, 160, 120, 0.7)');
                palm.setAttribute('stroke-width', '2');
                svgElement.appendChild(palm);

                // 손바닥 하이라이트
                const palmHigh = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
                palmHigh.setAttribute('cx', palmCenterX - palmSize * 0.5);
                palmHigh.setAttribute('cy', palmCenterY - palmSize * 0.3);
                palmHigh.setAttribute('rx', palmSize * 0.6);
                palmHigh.setAttribute('ry', palmSize * 0.8);
                palmHigh.setAttribute('fill', 'rgba(255, 220, 190, 0.4)');
                svgElement.appendChild(palmHigh);
            }

            // === 2. 캐릭터 스타일 손가락 (둥근 모양) ===
            const fingerConfigs = [
                { base: 1, tips: [2, 3, 4], color: 'rgba(255, 190, 150, 0.95)' },     // 엄지
                { base: 5, tips: [6, 7, 8], color: 'rgba(255, 200, 160, 0.95)' },    // 검지
                { base: 9, tips: [10, 11, 12], color: 'rgba(255, 200, 160, 0.95)' }, // 중지
                { base: 13, tips: [14, 15, 16], color: 'rgba(255, 195, 155, 0.95)' }, // 약지
                { base: 17, tips: [18, 19, 20], color: 'rgba(255, 190, 150, 0.95)' }  // 소지
            ];

            fingerConfigs.forEach((config, idx) => {
                const basePoint = landmarks[config.base];
                if (!basePoint) return;

                // 마지막 끝점
                const tipIdx = config.tips[config.tips.length - 1];
                const tipPoint = landmarks[tipIdx];
                if (!tipPoint) return;

                // 손가락 경로 그리기 (둥근 튜브)
                const fingerPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');

                const startX = basePoint.x;
                const startY = basePoint.y;
                const endX = tipPoint.x;
                const endY = tipPoint.y;

                // 손가락 각도 계산
                const angle = Math.atan2(endY - startY, endX - startX);
                const fingerWidth = palmSize * 0.7;

                // 손가락을 둥근 직사각형 형태로
                const perpX = Math.sin(angle) * fingerWidth;
                const perpY = -Math.cos(angle) * fingerWidth;

                const path = `
                    M ${startX - perpX} ${startY - perpY}
                    L ${endX - perpX} ${endY - perpY}
                    Q ${endX + fingerWidth * 0.5} ${endY} ${endX + perpX} ${endY + perpY}
                    L ${startX + perpX} ${startY + perpY}
                    Q ${startX - fingerWidth * 0.5} ${startY} ${startX - perpX} ${startY - perpY}
                `;

                fingerPath.setAttribute('d', path);
                fingerPath.setAttribute('fill', config.color);
                fingerPath.setAttribute('stroke', 'rgba(200, 150, 110, 0.6)');
                fingerPath.setAttribute('stroke-width', '1');
                svgElement.appendChild(fingerPath);

                // 손가락 끝에 원형 추가 (귀여운 느낌)
                const fingerTip = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                fingerTip.setAttribute('cx', endX);
                fingerTip.setAttribute('cy', endY);
                fingerTip.setAttribute('r', palmSize * 0.5);
                fingerTip.setAttribute('fill', config.color);
                fingerTip.setAttribute('stroke', 'rgba(200, 150, 110, 0.6)');
                fingerTip.setAttribute('stroke-width', '1');
                svgElement.appendChild(fingerTip);
            });

            // === 3. 손가락 뼈대 (배경용) ===
            connections.forEach(([from, to]) => {
                const fromLm = landmarks[from];
                const toLm = landmarks[to];
                if (fromLm && toLm) {
                    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
                    line.setAttribute('x1', fromLm.x);
                    line.setAttribute('y1', fromLm.y);
                    line.setAttribute('x2', toLm.x);
                    line.setAttribute('y2', toLm.y);
                    line.setAttribute('stroke', 'rgba(150, 100, 70, 0.25)');
                    line.setAttribute('stroke-width', '1');
                    svgElement.appendChild(line);
                }
            });

            if (validLandmarks > 0) {
                console.log(`👋 손${handIndex + 1}: ${validLandmarks}/21 랜드마크 감지`);
            }
        }

        // 이벤트 리스너
        elements.startBtn.addEventListener('click', async () => {
            if (!state.detector || !state.handDetector) {
                showError('모델이 아직 준비되지 않았습니다');
                return;
            }
            startCamera();
        });

        elements.stopBtn.addEventListener('click', stopCamera);

        // 초기화
        async function init() {
            elements.stopBtn.disabled = true;
            const success = await initModels();
            if (!success) {
                elements.loading.style.display = 'block';
                setTimeout(() => {
                    elements.loading.style.display = 'none';
                }, 2000);
            }
        }

        // 페이지 로드 시 초기화
        window.addEventListener('load', init);

        // 언마운트 시 정리
        window.addEventListener('beforeunload', () => {
            stopCamera();
        });
    </script>
</body>
</html>
